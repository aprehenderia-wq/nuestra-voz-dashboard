<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestra Voz — Dashboard Editorial</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --fondo: #f2e0bc;
  --texto: #1c1c1c;
  --rojo: #f65449;
  --verde: #029e75;
  --blanco: #ffffff;
  --texto-sobre-rojo: #ffffff;
  --card: #f7ebce;
  --card-hover: #f3e4c4;
  --overlay: rgba(28,28,28,0.7);
  --border: rgba(28,28,28,0.12);
  --shadow: 0 2px 8px rgba(28,28,28,0.08), 0 1px 3px rgba(28,28,28,0.06);
  --shadow-lg: 0 20px 50px rgba(28,28,28,0.25);
  --radius: 14px;
  --radius-sm: 8px;
}

html, body { height: 100%; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: var(--fondo);
  color: var(--texto);
  line-height: 1.6;
  min-height: 100vh;
}

.top-bar { height: 6px; width: 100%; background: var(--rojo); }

a { color: var(--rojo); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ===== LOGIN SCREEN ===== */
#login-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: var(--fondo);
  padding: 20px;
}

.login-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 48px 40px;
  max-width: 420px;
  width: 100%;
  box-shadow: var(--shadow-lg);
  text-align: center;
}

.login-accent {
  width: 48px; height: 6px;
  background: var(--rojo);
  border-radius: 4px;
  margin: 0 auto 20px;
}

.login-logo {
  font-size: 1.7rem; font-weight: 800;
  color: var(--texto); margin-bottom: 6px;
  letter-spacing: -0.5px;
}

.login-subtitle {
  color: #5a5044; font-size: 0.92rem;
  margin-bottom: 32px; font-weight: 400;
}

.login-box input {
  width: 100%; padding: 14px 18px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 1rem; font-family: inherit;
  outline: none; background: #fffaf0;
  color: var(--texto);
  transition: border-color 0.2s ease;
  margin-bottom: 16px;
}

.login-box input:focus { border-color: var(--rojo); }

.login-box button {
  width: 100%; padding: 14px;
  background: var(--rojo); color: var(--texto-sobre-rojo);
  border: none; border-radius: var(--radius-sm);
  font-size: 1rem; font-weight: 700;
  font-family: inherit; cursor: pointer;
  transition: background 0.2s ease, transform 0.1s ease;
}

.login-box button:hover { background: #e0392f; transform: translateY(-1px); }
.login-box button:active { transform: translateY(0); }
.login-box button:disabled { opacity: 0.6; cursor: default; transform: none; }

.login-error {
  color: var(--rojo); font-size: 0.875rem;
  margin-top: 12px; min-height: 20px; font-weight: 600;
}

/* ===== MAIN APP ===== */
#app { display: none; }

header.app-header {
  padding: 32px 24px 20px;
  max-width: 1300px; margin: 0 auto;
}

.app-title {
  font-size: 1.9rem; font-weight: 800;
  letter-spacing: -0.5px;
  display: flex; align-items: center; gap: 10px;
}

.app-title .dot { color: var(--rojo); }

.app-subtitle {
  color: #5a5044; font-size: 0.95rem;
  margin-top: 4px; font-weight: 500;
}

.stats-row {
  display: flex; gap: 16px;
  margin-top: 18px; flex-wrap: wrap;
}

.stat {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 18px; min-width: 110px;
}

.stat-val { font-size: 1.3rem; font-weight: 800; }
.stat-label {
  font-size: 0.75rem; color: #5a5044;
  text-transform: uppercase; letter-spacing: 0.4px; font-weight: 600;
}

/* ===== TOOLBAR ===== */
.toolbar {
  padding: 16px 24px;
  max-width: 1300px; margin: 0 auto;
  display: flex; gap: 12px;
  flex-wrap: wrap; align-items: center;
}

.toolbar input[type="text"] {
  flex: 1; min-width: 200px;
  padding: 10px 16px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 0.95rem; font-family: inherit;
  outline: none; background: #fffaf0;
  color: var(--texto);
  transition: border-color 0.2s ease;
}

.toolbar input[type="text"]:focus { border-color: var(--rojo); }

.toolbar select {
  padding: 10px 14px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 0.95rem; font-family: inherit;
  outline: none; background: #fffaf0;
  color: var(--texto); cursor: pointer;
  transition: border-color 0.2s ease;
}

.toolbar select:focus { border-color: var(--rojo); }

/* ===== CARDS GRID ===== */
.cards-container {
  padding: 8px 24px 40px;
  max-width: 1300px; margin: 0 auto;
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap: 20px;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  cursor: pointer;
  transition: box-shadow 0.2s ease, transform 0.15s ease;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute; top: 0; left: 0;
  width: 4px; height: 100%;
  background: var(--rojo);
}

.card.card-ficha::before {
  background: var(--verde);
}

.card:hover {
  box-shadow: var(--shadow);
  transform: translateY(-2px);
}

.card-date {
  font-size: 0.8rem; color: #5a5044;
  font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; margin-bottom: 6px;
}

.card-category {
  display: inline-block;
  background: var(--rojo);
  color: var(--texto-sobre-rojo);
  font-size: 0.7rem; font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}

.card-category.published {
  background: var(--verde);
}

.card-potencial {
  display: inline-block;
  font-size: 0.7rem; font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}

.card-potencial.alto {
  background: rgba(2,158,117,0.15);
  color: var(--verde);
}

.card-potencial.medio-alto {
  background: rgba(2,158,117,0.1);
  color: #048a66;
}

.card-potencial.medio {
  background: rgba(246,84,73,0.1);
  color: #c04a42;
}

.card-potencial.bajo {
  background: rgba(28,28,28,0.08);
  color: #5a5044;
}

.card-solo-ficha {
  display: inline-block;
  font-size: 0.65rem; font-weight: 700;
  padding: 2px 8px;
  border-radius: 12px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin-left: 6px;
  background: rgba(2,158,117,0.12);
  color: var(--verde);
  vertical-align: middle;
}

.card-tema {
  font-size: 1.15rem; font-weight: 700;
  line-height: 1.35; margin-bottom: 8px;
  color: var(--texto);
}

.card-invitado {
  font-size: 0.9rem; color: #5a5044;
  margin-bottom: 10px;
}

.card-tesis {
  font-size: 0.88rem; color: #3a3530;
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-status {
  display: inline-block;
  font-size: 0.72rem; font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  margin-top: 10px;
}

.card-status.pendiente {
  background: rgba(246,84,73,0.15);
  color: var(--rojo);
}

.card-status.publicado {
  background: rgba(2,158,117,0.15);
  color: var(--verde);
}

.no-results {
  text-align: center; padding: 60px 20px;
  color: #5a5044; font-size: 1rem;
}

/* ===== MODAL / EXPANDED VIEW ===== */
.modal-overlay {
  display: none;
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  background: var(--overlay);
  z-index: 1000;
  overflow-y: auto;
  padding: 20px;
}

.modal-overlay.active { display: flex; justify-content: center; align-items: flex-start; }

.modal-content {
  background: var(--fondo);
  border-radius: var(--radius);
  max-width: 900px; width: 100%;
  margin: 40px auto;
  box-shadow: var(--shadow-lg);
  position: relative;
  overflow: hidden;
}

.modal-header {
  background: var(--rojo);
  color: var(--texto-sobre-rojo);
  padding: 28px 32px 20px;
  position: relative;
}

.modal-header.ficha-header {
  background: var(--verde);
}

.modal-close {
  position: absolute; top: 16px; right: 20px;
  background: rgba(255,255,255,0.2);
  border: none; color: var(--texto-sobre-rojo);
  width: 36px; height: 36px;
  border-radius: 50%; cursor: pointer;
  font-size: 1.2rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}

.modal-close:hover { background: rgba(255,255,255,0.35); }

.modal-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 6px; }
.modal-meta { font-size: 0.88rem; opacity: 0.9; }

.modal-body { padding: 28px 32px 32px; }

.modal-section {
  margin-bottom: 28px;
}

.modal-section-title {
  font-size: 0.85rem; font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--rojo);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 2px solid rgba(246,84,73,0.2);
}

.modal-section-title.verde-title {
  color: var(--verde);
  border-bottom-color: rgba(2,158,117,0.2);
}

.modal-section ul {
  list-style: none; padding: 0;
}

.modal-section ul li {
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.92rem;
  line-height: 1.5;
}

.modal-section ul li:last-child { border-bottom: none; }

.modal-text {
  font-size: 0.92rem; line-height: 1.65;
  color: #3a3530;
}

.modal-quote {
  font-style: italic;
  border-left: 3px solid var(--rojo);
  padding: 8px 16px;
  margin: 8px 0;
  font-size: 0.92rem;
  color: #3a3530;
  line-height: 1.55;
  background: rgba(246,84,73,0.04);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}

/* ===== ENTREGABLES TABS ===== */
.entregables-tabs {
  display: flex; gap: 4px;
  flex-wrap: wrap;
  border-bottom: 2px solid var(--border);
  margin-bottom: 16px;
}

.entregable-tab {
  padding: 8px 16px;
  border: none; background: none;
  font-family: inherit; font-size: 0.82rem;
  font-weight: 600; color: #5a5044;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all 0.2s ease;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.entregable-tab:hover { color: var(--rojo); }
.entregable-tab.active {
  color: var(--rojo);
  border-bottom-color: var(--rojo);
}

.entregable-content {
  display: none;
}

.entregable-content.active {
  display: block;
}

.entregable-toolbar {
  display: flex; align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
  padding: 8px 12px;
  background: rgba(28,28,28,0.04);
  border-radius: var(--radius-sm);
  flex-wrap: wrap;
}

.entregable-name {
  font-size: 0.82rem; font-weight: 600;
  color: #5a5044;
  font-family: 'Consolas', 'Monaco', monospace;
}

.entregable-download {
  padding: 6px 14px;
  background: var(--rojo); color: var(--texto-sobre-rojo);
  border: none; border-radius: var(--radius-sm);
  font-size: 0.8rem; font-weight: 700;
  font-family: inherit; cursor: pointer;
  transition: background 0.2s ease;
}

.entregable-download:hover { background: #e0392f; }

.entregable-body {
  font-size: 0.9rem;
  line-height: 1.7;
  color: var(--texto);
  max-height: 500px;
  overflow-y: auto;
  padding: 16px;
  background: #fffaf0;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}

.entregable-body h1,
.entregable-body h2,
.entregable-body h3,
.entregable-body h4 {
  font-weight: 700;
  margin: 16px 0 8px 0;
  line-height: 1.35;
  color: var(--texto);
}

.entregable-body h1 { font-size: 1.25rem; }
.entregable-body h2 { font-size: 1.1rem; }
.entregable-body h3 { font-size: 1rem; }
.entregable-body h4 { font-size: 0.95rem; }

.entregable-body p {
  margin: 8px 0;
}

.entregable-body ul, .entregable-body ol {
  margin: 8px 0;
  padding-left: 24px;
}

.entregable-body li {
  margin: 4px 0;
  border-bottom: none;
  padding: 2px 0;
}

.entregable-body hr {
  border: none;
  border-top: 2px solid var(--border);
  margin: 16px 0;
}

.entregable-body strong {
  font-weight: 700;
}

.entregable-body em {
  font-style: italic;
}

.entregable-body blockquote {
  border-left: 3px solid var(--rojo);
  padding: 4px 12px;
  margin: 8px 0;
  color: #5a5044;
  font-style: italic;
}

.entregable-body table {
  width: 100%;
  border-collapse: collapse;
  margin: 12px 0;
  font-size: 0.85rem;
}

.entregable-body table th,
.entregable-body table td {
  border: 1px solid var(--border);
  padding: 6px 10px;
  text-align: left;
}

.entregable-body table th {
  background: rgba(28,28,28,0.05);
  font-weight: 700;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
  .cards-grid {
    grid-template-columns: 1fr;
  }

  .app-title { font-size: 1.4rem; }

  .stats-row { gap: 8px; }
  .stat { padding: 8px 12px; min-width: 80px; }
  .stat-val { font-size: 1.1rem; }

  .toolbar { padding: 12px 16px; }
  .toolbar input[type="text"] { min-width: 100%; }

  .cards-container { padding: 8px 16px 30px; }

  .modal-content { margin: 10px auto; }
  .modal-header { padding: 20px 20px 16px; }
  .modal-title { font-size: 1.2rem; }
  .modal-body { padding: 20px; }

  header.app-header { padding: 20px 16px 16px; }

  .entregable-tab { padding: 6px 10px; font-size: 0.75rem; }
  .entregable-toolbar { flex-direction: column; align-items: flex-start; }
}
</style>
</head>

<div class="top-bar"></div>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-accent"></div>
    <div class="login-logo">Nuestra Voz</div>
    <div class="login-subtitle">Dashboard Editorial</div>
    <input type="password" id="password-input" placeholder="Contrasena" autocomplete="off">
    <button id="login-btn" onclick="handleLogin()">Ingresar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header class="app-header">
    <div class="app-title">Nuestra Voz<span class="dot">.</span></div>
    <div class="app-subtitle">Dashboard Editorial</div>
    <div class="stats-row">
      <div class="stat"><div class="stat-val" id="stat-total">0</div><div class="stat-label">Fichas totales</div></div>
      <div class="stat"><div class="stat-val" id="stat-selected">0</div><div class="stat-label">Seleccionadas</div></div>
      <div class="stat"><div class="stat-val" id="stat-fichas-only">0</div><div class="stat-label">Solo ficha</div></div>
      <div class="stat"><div class="stat-val" id="stat-pendientes">0</div><div class="stat-label">Pendientes</div></div>
      <div class="stat"><div class="stat-val" id="stat-categorias">0</div><div class="stat-label">Categorias</div></div>
    </div>
  </header>

  <div class="toolbar">
    <input type="text" id="search-input" placeholder="Buscar por tema, invitado, fecha...">
    <select id="filter-category">
      <option value="">Todas las categorias</option>
    </select>
    <select id="filter-type">
      <option value="">Todos los tipos</option>
      <option value="selected">Seleccionadas</option>
      <option value="ficha">Solo ficha</option>
    </select>
    <select id="filter-status">
      <option value="">Todos los estados</option>
      <option value="pendiente">Pendiente</option>
      <option value="publicado">Publicado</option>
    </select>
  </div>

  <div class="cards-container">
    <div class="cards-grid" id="cards-grid"></div>
    <div class="no-results" id="no-results" style="display:none;">No se encontraron resultados.</div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal-content" id="modal-content"></div>
</div>

  btn.disabled = true;
  btn.textContent = 'Descifrando...';
  errEl.textContent = '';

  try {
    const decrypted = await decryptData(pwd, ENCRYPTED_DATA);
    appData = JSON.parse(decrypted);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  } catch (e) {
    errEl.textContent = 'Contrasena incorrecta.';
    btn.disabled = false;
    btn.textContent = 'Ingresar';
  }
}

async function decryptData(password, base64Data) {
  const combined = Uint8Array.from(atob(base64Data), c => c.charCodeAt(0));
  const salt = combined.slice(0, 16);
  const iv = combined.slice(16, 28);
  const authTag = combined.slice(28, 44);
  const ciphertext = combined.slice(44);

  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );

  const ciphertextWithTag = new Uint8Array(ciphertext.length + authTag.length);
  ciphertextWithTag.set(ciphertext);
  ciphertextWithTag.set(authTag, ciphertext.length);

  const decrypted = await crypto.subtle.decrypt(
    { name: 'AES-GCM', iv: iv },
    key,
    ciphertextWithTag
  );

  return new TextDecoder().decode(decrypted);
}

// ========== BUILD FLAT CARDS LIST ==========
function buildCardsList(entries) {
  const cards = [];
  entries.forEach(function(entry) {
    // The selected interview card
    cards.push({
      type: 'selected',
      id: entry.id,
      fecha: entry.fecha_emision || '',
      dia: entry.dia_semana || '',
      tema: entry.tema || entry.tema_central || '',
      invitado: entry.invitado_principal || entry.invitados || '',
      cargo: entry.cargo || '',
      tesis: entry.tesis_principal_invitado || entry.resumen || '',
      categoria: entry.categoria_tematica || '',
      status: entry.articulo_publicado || 'pendiente',
      ideas: entry.ideas_clave || [],
      datos: entry.datos_duros_principales || [],
      angulo: entry.angulo_no_explorado || '',
      pullQuotes: entry.pull_quotes || [],
      clips: entry.cantidad_clips || 0,
      tiposClip: entry.tipos_clip || [],
      entregables: entry.entregables || {},
      programa: entry.programa || 'Nuestra Voz'
    });

    // Non-selected interviews from entrevistas_no_seleccionadas
    var noSel = entry.entrevistas_no_seleccionadas || [];
    noSel.forEach(function(ns, idx) {
      cards.push({
        type: 'ficha',
        id: entry.id + '-ns-' + idx,
        parentId: entry.id,
        fecha: entry.fecha_emision || '',
        dia: entry.dia_semana || '',
        tema: ns.tema || '',
        invitado: ns.invitados || '',
        potencial: ns.potencial || '',
        programa: entry.programa || 'Nuestra Voz'
      });
    });
  });
  return cards;
}

// ========== INIT APP ==========
function initApp() {
  var entries = appData.entradas || [];
  allCards = buildCardsList(entries);
  populateStats();
  populateFilters();
  renderCards(allCards);

  document.getElementById('search-input').addEventListener('input', function() { filterAndRender(); });
  document.getElementById('filter-category').addEventListener('change', function() { filterAndRender(); });
  document.getElementById('filter-type').addEventListener('change', function() { filterAndRender(); });
  document.getElementById('filter-status').addEventListener('change', function() { filterAndRender(); });
}

// ========== STATS ==========
function populateStats() {
  var total = allCards.length;
  var selected = allCards.filter(function(c) { return c.type === 'selected'; }).length;
  var fichasOnly = allCards.filter(function(c) { return c.type === 'ficha'; }).length;
  var pendientes = allCards.filter(function(c) { return c.type === 'selected' && (c.status || 'pendiente') === 'pendiente'; }).length;
  var categorias = new Set(allCards.filter(function(c) { return c.type === 'selected' && c.categoria; }).map(function(c) { return c.categoria; }));

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-selected').textContent = selected;
  document.getElementById('stat-fichas-only').textContent = fichasOnly;
  document.getElementById('stat-pendientes').textContent = pendientes;
  document.getElementById('stat-categorias').textContent = categorias.size;
}

// ========== FILTERS ==========
function populateFilters() {
  var catSet = new Set();
  allCards.forEach(function(c) {
    if (c.type === 'selected' && c.categoria) catSet.add(c.categoria);
  });
  var catSelect = document.getElementById('filter-category');
  catSet.forEach(function(cat) {
    var opt = document.createElement('option');
    opt.value = cat;
    opt.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
    catSelect.appendChild(opt);
  });
}

function filterAndRender() {
  var query = document.getElementById('search-input').value.toLowerCase().trim();
  var catFilter = document.getElementById('filter-category').value;
  var typeFilter = document.getElementById('filter-type').value;
  var statusFilter = document.getElementById('filter-status').value;

  var filtered = allCards.filter(function(c) {
    // Search
    if (query) {
      var searchable = (c.tema + ' ' + c.invitado + ' ' + c.fecha + ' ' + (c.tesis || '') + ' ' + (c.categoria || '') + ' ' + (c.potencial || '')).toLowerCase();
      if (searchable.indexOf(query) === -1) return false;
    }
    // Category
    if (catFilter) {
      if (c.type === 'ficha') return false;
      if (c.categoria !== catFilter) return false;
    }
    // Type
    if (typeFilter === 'selected' && c.type !== 'selected') return false;
    if (typeFilter === 'ficha' && c.type !== 'ficha') return false;
    // Status (only applies to selected)
    if (statusFilter) {
      if (c.type === 'ficha') return false;
      if ((c.status || 'pendiente') !== statusFilter) return false;
    }
    return true;
  });

  renderCards(filtered);
}

// ========== RENDER CARDS ==========
function renderCards(cards) {
  var grid = document.getElementById('cards-grid');
  var noRes = document.getElementById('no-results');

  if (cards.length === 0) {
    grid.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }

  noRes.style.display = 'none';

  grid.innerHTML = cards.map(function(c) {
    if (c.type === 'selected') {
      return renderSelectedCard(c);
    } else {
      return renderFichaCard(c);
    }
  }).join('');
}

function renderSelectedCard(c) {
  var statusClass = c.status === 'publicado' ? 'publicado' : 'pendiente';
  var statusLabel = c.status === 'publicado' ? 'Publicado' : 'Pendiente';

  return '<div class="card" onclick=\'openSelectedModal(' + JSON.stringify(c.id) + ')\'>' +
    '<div class="card-date">' + escapeHtml(c.fecha) + (c.dia ? ' &mdash; ' + escapeHtml(c.dia) : '') + '</div>' +
    (c.categoria ? '<span class="card-category">' + escapeHtml(c.categoria) + '</span> ' : '') +
    '<div class="card-tema">' + escapeHtml(c.tema) + '</div>' +
    '<div class="card-invitado">' + escapeHtml(c.invitado) + '</div>' +
    '<div class="card-tesis">' + escapeHtml(c.tesis) + '</div>' +
    '<span class="card-status ' + statusClass + '">' + statusLabel + '</span>' +
  '</div>';
}

function renderFichaCard(c) {
  var potClass = (c.potencial || '').toLowerCase().replace(/[\s]/g, '-');
  return '<div class="card card-ficha" onclick=\'openFichaModal(' + JSON.stringify(c.id) + ')\'>' +
    '<div class="card-date">' + escapeHtml(c.fecha) + (c.dia ? ' &mdash; ' + escapeHtml(c.dia) : '') + '</div>' +
    (c.potencial ? '<span class="card-potencial ' + escapeHtml(potClass) + '">Potencial: ' + escapeHtml(c.potencial) + '</span>' : '') +
    '<span class="card-solo-ficha">Solo ficha</span>' +
    '<div class="card-tema">' + escapeHtml(c.tema) + '</div>' +
    '<div class="card-invitado">' + escapeHtml(c.invitado) + '</div>' +
  '</div>';
}

// ========== ESCAPE HTML ==========
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ========== MARKDOWN RENDERER ==========
function renderMarkdown(text) {
  if (!text) return '<p>(Sin contenido)</p>';

  // Normalize line endings
  text = text.replace(/\r\n/g, '\n');

  // Split into lines
  var lines = text.split('\n');
  var html = [];
  var inList = false;
  var inTable = false;
  var tableRows = [];

  function processInline(line) {
    // Bold: **text**
    line = line.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic: *text* (but not inside bold)
    line = line.replace(/(?<!\*)\*([^*]+?)\*(?!\*)/g, '<em>$1</em>');
    // Inline code: `text`
    line = line.replace(/`([^`]+?)`/g, '<code style="background:rgba(28,28,28,0.06);padding:1px 5px;border-radius:3px;font-size:0.9em;">$1</code>');
    // Links: [text](url)
    line = line.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
    return line;
  }

  function flushTable() {
    if (tableRows.length === 0) return;
    var tableHtml = '<table>';
    tableRows.forEach(function(row, ri) {
      // Skip separator row
      if (row.match(/^\|[\s\-:|]+\|$/)) return;
      var tag = ri === 0 ? 'th' : 'td';
      var cells = row.split('|').filter(function(c, i, a) { return i > 0 && i < a.length - 1; });
      tableHtml += '<tr>';
      cells.forEach(function(cell) {
        tableHtml += '<' + tag + '>' + processInline(cell.trim()) + '</' + tag + '>';
      });
      tableHtml += '</tr>';
    });
    tableHtml += '</table>';
    html.push(tableHtml);
    tableRows = [];
    inTable = false;
  }

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];

    // Table detection
    if (line.match(/^\|.+\|$/)) {
      if (inList) { html.push('</ul>'); inList = false; }
      inTable = true;
      tableRows.push(line);
      continue;
    } else if (inTable) {
      flushTable();
    }

    // Horizontal rule
    if (line.match(/^---+\s*$/)) {
      if (inList) { html.push('</ul>'); inList = false; }
      html.push('<hr>');
      continue;
    }

    // Headers
    var headerMatch = line.match(/^(#{1,4})\s+(.+)$/);
    if (headerMatch) {
      if (inList) { html.push('</ul>'); inList = false; }
      var level = headerMatch[1].length;
      html.push('<h' + level + '>' + processInline(headerMatch[2]) + '</h' + level + '>');
      continue;
    }

    // Bullet list items
    if (line.match(/^\s*[-*]\s+/)) {
      var content = line.replace(/^\s*[-*]\s+/, '');
      if (!inList) { html.push('<ul>'); inList = true; }
      html.push('<li>' + processInline(content) + '</li>');
      continue;
    }

    // Numbered list items
    if (line.match(/^\s*\d+\.\s+/)) {
      var content = line.replace(/^\s*\d+\.\s+/, '');
      if (!inList) { html.push('<ul>'); inList = true; }
      html.push('<li>' + processInline(content) + '</li>');
      continue;
    }

    // Close list if not a list item
    if (inList) {
      html.push('</ul>');
      inList = false;
    }

    // Blank line
    if (line.trim() === '') {
      continue;
    }

    // Blockquote
    if (line.match(/^>\s*/)) {
      var quoteContent = line.replace(/^>\s*/, '');
      html.push('<blockquote>' + processInline(quoteContent) + '</blockquote>');
      continue;
    }

    // Regular paragraph
    html.push('<p>' + processInline(line) + '</p>');
  }

  if (inList) html.push('</ul>');
  if (inTable) flushTable();

  return html.join('\n');
}

// ========== OPEN SELECTED INTERVIEW MODAL ==========
function openSelectedModal(id) {
  var card = allCards.find(function(c) { return c.id === id && c.type === 'selected'; });
  if (!card) return;

  var overlay = document.getElementById('modal-overlay');
  var content = document.getElementById('modal-content');

  var ideasHtml = '';
  if (card.ideas && card.ideas.length > 0) {
    ideasHtml = '<div class="modal-section"><div class="modal-section-title">Ideas clave</div><ul>' +
      card.ideas.map(function(i) { return '<li>' + escapeHtml(i) + '</li>'; }).join('') + '</ul></div>';
  }

  var datosHtml = '';
  if (card.datos && card.datos.length > 0) {
    datosHtml = '<div class="modal-section"><div class="modal-section-title">Datos duros</div><ul>' +
      card.datos.map(function(d) { return '<li>' + escapeHtml(d) + '</li>'; }).join('') + '</ul></div>';
  }

  var quotesHtml = '';
  if (card.pullQuotes && card.pullQuotes.length > 0) {
    quotesHtml = '<div class="modal-section"><div class="modal-section-title">Citas destacadas</div>' +
      card.pullQuotes.map(function(q) { return '<div class="modal-quote">' + escapeHtml(q) + '</div>'; }).join('') + '</div>';
  }

  var anguloHtml = '';
  if (card.angulo) {
    anguloHtml = '<div class="modal-section"><div class="modal-section-title">Angulo no explorado</div>' +
      '<div class="modal-text">' + escapeHtml(card.angulo) + '</div></div>';
  }

  var clipsHtml = '';
  if (card.clips > 0) {
    clipsHtml = '<div class="modal-section"><div class="modal-section-title">Clips propuestos</div>' +
      '<div class="modal-text">' + card.clips + ' clips: ' + escapeHtml(card.tiposClip.join(', ')) + '</div></div>';
  }

  // Build entregables tabs
  var entregables = card.entregables || {};
  var pasos = Object.keys(entregables).sort();
  var entregablesHtml = '';
  if (pasos.length > 0) {
    var tabs = pasos.map(function(p, i) {
      var info = entregables[p];
      return '<button class="entregable-tab' + (i===0?' active':'') + '" onclick="switchEntregable(event, \'' + p + '\')">' +
        escapeHtml(info.tipo || p) + '</button>';
    }).join('');

    var contents = pasos.map(function(p, i) {
      var info = entregables[p];
      return '<div class="entregable-content' + (i===0?' active':'') + '" id="entregable-' + p + '">' +
        '<div class="entregable-toolbar">' +
          '<span class="entregable-name">' + escapeHtml(info.archivo || p) + '</span>' +
          '<button class="entregable-download" onclick="downloadEntregable(\'' + escapeHtml(info.archivo || p) + '\', \'' + p + '\')">Descargar .md</button>' +
        '</div>' +
        '<div class="entregable-body">' + renderMarkdown(info.contenido || '') + '</div>' +
      '</div>';
    }).join('');

    entregablesHtml = '<div class="modal-section"><div class="modal-section-title">Entregables del pipeline</div>' +
      '<div class="entregables-tabs">' + tabs + '</div>' + contents + '</div>';
  }

  var tesis = card.tesis || '';

  content.innerHTML =
    '<div class="modal-header">' +
      '<button class="modal-close" onclick="closeModal()">&times;</button>' +
      '<div class="modal-title">' + escapeHtml(card.tema) + '</div>' +
      '<div class="modal-meta">' +
        escapeHtml(card.fecha) + ' &mdash; ' + escapeHtml(card.invitado) +
        (card.cargo ? ' (' + escapeHtml(card.cargo) + ')' : '') +
        (card.categoria ? ' &mdash; ' + escapeHtml(card.categoria) : '') +
      '</div>' +
    '</div>' +
    '<div class="modal-body">' +
      (tesis ? '<div class="modal-section"><div class="modal-section-title">Tesis principal</div><div class="modal-text">' + escapeHtml(tesis) + '</div></div>' : '') +
      ideasHtml +
      datosHtml +
      quotesHtml +
      anguloHtml +
      clipsHtml +
      entregablesHtml +
    '</div>';

  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
  window._currentCard = card;
}

// ========== OPEN FICHA-ONLY MODAL ==========
function openFichaModal(id) {
  var card = allCards.find(function(c) { return c.id === id && c.type === 'ficha'; });
  if (!card) return;

  var overlay = document.getElementById('modal-overlay');
  var content = document.getElementById('modal-content');

  content.innerHTML =
    '<div class="modal-header ficha-header">' +
      '<button class="modal-close" onclick="closeModal()">&times;</button>' +
      '<div class="modal-title">' + escapeHtml(card.tema) + '</div>' +
      '<div class="modal-meta">' +
        escapeHtml(card.fecha) + (card.dia ? ' &mdash; ' + escapeHtml(card.dia) : '') +
        ' &mdash; Solo ficha rapida' +
      '</div>' +
    '</div>' +
    '<div class="modal-body">' +
      '<div class="modal-section">' +
        '<div class="modal-section-title verde-title">Tema</div>' +
        '<div class="modal-text">' + escapeHtml(card.tema) + '</div>' +
      '</div>' +
      '<div class="modal-section">' +
        '<div class="modal-section-title verde-title">Invitados</div>' +
        '<div class="modal-text">' + escapeHtml(card.invitado) + '</div>' +
      '</div>' +
      (card.potencial ? '<div class="modal-section">' +
        '<div class="modal-section-title verde-title">Potencial de repurposing</div>' +
        '<div class="modal-text" style="font-weight:700;color:var(--verde);">' + escapeHtml(card.potencial) + '</div>' +
      '</div>' : '') +
      '<div class="modal-section" style="padding:16px;background:rgba(2,158,117,0.06);border-radius:var(--radius-sm);border:1px solid rgba(2,158,117,0.15);">' +
        '<div style="font-size:0.85rem;color:#5a5044;">Esta entrevista no fue seleccionada para el pipeline completo de repurposing. Solo se genero la ficha rapida (Paso 2). Para procesarla completa, solicite la ejecucion del pipeline desde el Paso 3.</div>' +
      '</div>' +
    '</div>';

  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

// ========== MODAL CONTROLS ==========
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  document.body.style.overflow = '';
}

function closeModalOutside(event) {
  if (event.target === document.getElementById('modal-overlay')) closeModal();
}

function switchEntregable(event, paso) {
  var parent = event.target.closest('.modal-section');
  parent.querySelectorAll('.entregable-tab').forEach(function(t) { t.classList.remove('active'); });
  parent.querySelectorAll('.entregable-content').forEach(function(c) { c.classList.remove('active'); });
  event.target.classList.add('active');
  var contentEl = parent.querySelector('#entregable-' + paso);
  if (contentEl) contentEl.classList.add('active');
}

function downloadEntregable(filename, paso) {
  var card = window._currentCard;
  if (!card || !card.entregables || !card.entregables[paso]) return;
  var contenido = card.entregables[paso].contenido || '';
  var blob = new Blob([contenido], { type: 'text/markdown;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});
