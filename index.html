<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestra Voz — Dashboard Editorial</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --fondo: #f2e0bc;
  --texto: #1c1c1c;
  --rojo: #f65449;
  --verde: #029e75;
  --texto-sobre-rojo: #ffffff;
  --card: #f7ebce;
  --card-hover: #f3e4c4;
  --overlay: rgba(28,28,28,0.7);
  --border: rgba(28,28,28,0.12);
  --shadow: 0 2px 8px rgba(28,28,28,0.08), 0 1px 3px rgba(28,28,28,0.06);
  --shadow-lg: 0 20px 50px rgba(28,28,28,0.25);
  --radius: 14px;
  --radius-sm: 8px;
}

html, body { height: 100%; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: var(--fondo);
  color: var(--texto);
  line-height: 1.6;
  min-height: 100vh;
}

.top-bar { height: 6px; width: 100%; background: var(--rojo); }

a { color: var(--rojo); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ===== LOGIN SCREEN ===== */
#login-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: var(--fondo);
  padding: 20px;
}

.login-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 48px 40px;
  max-width: 420px;
  width: 100%;
  box-shadow: var(--shadow-lg);
  text-align: center;
}

.login-accent {
  width: 48px; height: 6px;
  background: var(--rojo);
  border-radius: 4px;
  margin: 0 auto 20px;
}

.login-logo {
  font-size: 1.7rem; font-weight: 800;
  color: var(--texto); margin-bottom: 6px;
  letter-spacing: -0.5px;
}

.login-subtitle {
  color: #5a5044; font-size: 0.92rem;
  margin-bottom: 32px; font-weight: 400;
}

.login-box input {
  width: 100%; padding: 14px 18px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 1rem; font-family: inherit;
  outline: none; background: #fffaf0;
  color: var(--texto);
  transition: border-color 0.2s ease;
  margin-bottom: 16px;
}

.login-box input:focus { border-color: var(--rojo); }

.login-box button {
  width: 100%; padding: 14px;
  background: var(--rojo); color: var(--texto-sobre-rojo);
  border: none; border-radius: var(--radius-sm);
  font-size: 1rem; font-weight: 700;
  font-family: inherit; cursor: pointer;
  transition: background 0.2s ease, transform 0.1s ease;
}

.login-box button:hover { background: #e0392f; transform: translateY(-1px); }
.login-box button:active { transform: translateY(0); }
.login-box button:disabled { opacity: 0.6; cursor: default; transform: none; }

.login-error {
  color: var(--rojo); font-size: 0.875rem;
  margin-top: 12px; min-height: 20px; font-weight: 600;
}

/* ===== MAIN APP ===== */
#app { display: none; }

header.app-header {
  padding: 32px 24px 20px;
  max-width: 1300px; margin: 0 auto;
}

.app-title {
  font-size: 1.9rem; font-weight: 800;
  letter-spacing: -0.5px;
  display: flex; align-items: center; gap: 10px;
}

.app-title .dot { color: var(--rojo); }

.app-subtitle {
  color: #5a5044; font-size: 0.95rem;
  margin-top: 4px; font-weight: 500;
}

.stats-row {
  display: flex; gap: 16px;
  margin-top: 18px; flex-wrap: wrap;
}

.stat {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 18px; min-width: 110px;
}

.stat-val { font-size: 1.3rem; font-weight: 800; }
.stat-label {
  font-size: 0.75rem; color: #5a5044;
  text-transform: uppercase; letter-spacing: 0.4px; font-weight: 600;
}

/* ===== TOOLBAR ===== */
.toolbar {
  padding: 16px 24px;
  max-width: 1300px; margin: 0 auto;
  display: flex; gap: 12px;
  flex-wrap: wrap; align-items: center;
}

.toolbar input[type="text"] {
  flex: 1; min-width: 200px;
  padding: 10px 16px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 0.95rem; font-family: inherit;
  outline: none; background: #fffaf0;
  color: var(--texto);
  transition: border-color 0.2s ease;
}

.toolbar input[type="text"]:focus { border-color: var(--rojo); }

.toolbar select {
  padding: 10px 14px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 0.95rem; font-family: inherit;
  outline: none; background: #fffaf0;
  color: var(--texto); cursor: pointer;
  transition: border-color 0.2s ease;
}

.toolbar select:focus { border-color: var(--rojo); }

/* ===== CARDS GRID ===== */
.cards-container {
  padding: 8px 24px 40px;
  max-width: 1300px; margin: 0 auto;
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap: 20px;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  cursor: pointer;
  transition: box-shadow 0.2s ease, transform 0.15s ease;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute; top: 0; left: 0;
  width: 4px; height: 100%;
  background: var(--rojo);
}

.card:hover {
  box-shadow: var(--shadow);
  transform: translateY(-2px);
}

.card-date {
  font-size: 0.8rem; color: #5a5044;
  font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; margin-bottom: 6px;
}

.card-category {
  display: inline-block;
  background: var(--rojo);
  color: var(--texto-sobre-rojo);
  font-size: 0.7rem; font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}

.card-category.published {
  background: var(--verde);
}

.card-tema {
  font-size: 1.15rem; font-weight: 700;
  line-height: 1.35; margin-bottom: 8px;
  color: var(--texto);
}

.card-invitado {
  font-size: 0.9rem; color: #5a5044;
  margin-bottom: 10px;
}

.card-tesis {
  font-size: 0.88rem; color: #3a3530;
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-status {
  display: inline-block;
  font-size: 0.72rem; font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  margin-top: 10px;
}

.card-status.pendiente {
  background: rgba(246,84,73,0.15);
  color: var(--rojo);
}

.card-status.publicado {
  background: rgba(2,158,117,0.15);
  color: var(--verde);
}

.no-results {
  text-align: center; padding: 60px 20px;
  color: #5a5044; font-size: 1rem;
}

/* ===== MODAL / EXPANDED VIEW ===== */
.modal-overlay {
  display: none;
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  background: var(--overlay);
  z-index: 1000;
  overflow-y: auto;
  padding: 20px;
}

.modal-overlay.active { display: flex; justify-content: center; align-items: flex-start; }

.modal-content {
  background: var(--fondo);
  border-radius: var(--radius);
  max-width: 900px; width: 100%;
  margin: 40px auto;
  box-shadow: var(--shadow-lg);
  position: relative;
  overflow: hidden;
}

.modal-header {
  background: var(--rojo);
  color: var(--texto-sobre-rojo);
  padding: 28px 32px 20px;
  position: relative;
}

.modal-close {
  position: absolute; top: 16px; right: 20px;
  background: rgba(255,255,255,0.2);
  border: none; color: var(--texto-sobre-rojo);
  width: 36px; height: 36px;
  border-radius: 50%; cursor: pointer;
  font-size: 1.2rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}

.modal-close:hover { background: rgba(255,255,255,0.35); }

.modal-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 6px; }
.modal-meta { font-size: 0.88rem; opacity: 0.9; }

.modal-body { padding: 28px 32px 32px; }

.modal-section {
  margin-bottom: 28px;
}

.modal-section-title {
  font-size: 0.85rem; font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--rojo);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 2px solid rgba(246,84,73,0.2);
}

.modal-section ul {
  list-style: none; padding: 0;
}

.modal-section ul li {
  padding: 6px 0 6px 18px;
  position: relative;
  font-size: 0.92rem;
  line-height: 1.5;
}

.modal-section ul li::before {
  content: '';
  position: absolute; left: 0; top: 14px;
  width: 6px; height: 6px;
  background: var(--verde);
  border-radius: 50%;
}

.modal-quote {
  border-left: 3px solid var(--rojo);
  padding: 10px 16px;
  margin: 8px 0;
  background: rgba(246,84,73,0.05);
  font-style: italic;
  font-size: 0.92rem;
  line-height: 1.5;
}

.modal-text {
  font-size: 0.92rem;
  line-height: 1.6;
  color: #3a3530;
}

/* ===== ENTREGABLES ===== */
.entregables-tabs {
  display: flex; flex-wrap: wrap;
  gap: 6px; margin-bottom: 16px;
}

.entregable-tab {
  padding: 8px 14px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  background: transparent;
  font-size: 0.82rem; font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s ease;
  color: var(--texto);
}

.entregable-tab:hover { border-color: var(--rojo); color: var(--rojo); }
.entregable-tab.active { background: var(--rojo); color: var(--texto-sobre-rojo); border-color: var(--rojo); }

.entregable-content {
  display: none;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}

.entregable-content.active { display: block; }

.entregable-toolbar {
  display: flex; justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  background: rgba(28,28,28,0.04);
  border-bottom: 1px solid var(--border);
}

.entregable-name {
  font-size: 0.82rem; font-weight: 600;
  color: #5a5044;
}

.entregable-download {
  padding: 6px 14px;
  background: var(--verde);
  color: #ffffff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 0.78rem; font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.2s;
}

.entregable-download:hover { background: #028a66; }

.entregable-body {
  padding: 20px;
  max-height: 500px;
  overflow-y: auto;
  font-size: 0.88rem;
  line-height: 1.7;
  white-space: pre-wrap;
  word-wrap: break-word;
  color: #3a3530;
  font-family: 'Courier New', Courier, monospace;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .cards-grid {
    grid-template-columns: 1fr;
  }
  .modal-content { margin: 10px; }
  .modal-header { padding: 20px; }
  .modal-body { padding: 20px; }
  .modal-title { font-size: 1.2rem; }
  header.app-header { padding: 24px 16px 16px; }
  .toolbar { padding: 12px 16px; }
  .cards-container { padding: 8px 16px 40px; }
  .app-title { font-size: 1.4rem; }
  .stats-row { gap: 8px; }
  .stat { padding: 8px 12px; min-width: 90px; }
  .login-box { padding: 32px 24px; }
}

@media (max-width: 480px) {
  .toolbar { flex-direction: column; }
  .toolbar input[type="text"] { min-width: unset; width: 100%; }
  .toolbar select { width: 100%; }
  .entregables-tabs { gap: 4px; }
  .entregable-tab { padding: 6px 10px; font-size: 0.75rem; }
}

/* Scrollbar styling */
.entregable-body::-webkit-scrollbar { width: 6px; }
.entregable-body::-webkit-scrollbar-track { background: transparent; }
.entregable-body::-webkit-scrollbar-thumb { background: rgba(28,28,28,0.2); border-radius: 3px; }
.entregable-body::-webkit-scrollbar-thumb:hover { background: rgba(28,28,28,0.35); }

.modal-overlay::-webkit-scrollbar { width: 8px; }
.modal-overlay::-webkit-scrollbar-track { background: transparent; }
.modal-overlay::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; }
</style>
</head>

<div class="top-bar"></div>

<div id="login-screen">
  <div class="login-box">
    <div class="login-accent"></div>
    <div class="login-logo">Nuestra Voz</div>
    <div class="login-subtitle">Dashboard Editorial &mdash; Acceso restringido</div>
    <input type="password" id="password-input" placeholder="Contrasena" autocomplete="off" autofocus>

  <div class="cards-container">

    <div class="no-results" id="no-results" style="display:none;">No se encontraron entrevistas con esos criterios.</div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal-content" id="modal-content"></div>
</div>

  if (!pwd) { errEl.textContent = 'Ingrese la contrasena.'; return; }

  btn.disabled = true;
  btn.textContent = 'Descifrando...';
  errEl.textContent = '';

  try {
    const decrypted = await decryptData(pwd, ENCRYPTED_DATA);
    appData = JSON.parse(decrypted);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  } catch (e) {
    errEl.textContent = 'Contrasena incorrecta.';
    btn.disabled = false;
    btn.textContent = 'Ingresar';
  }
}

async function decryptData(password, base64Data) {
  const combined = Uint8Array.from(atob(base64Data), c => c.charCodeAt(0));
  const salt = combined.slice(0, 16);
  const iv = combined.slice(16, 28);
  const authTag = combined.slice(28, 44);
  const ciphertext = combined.slice(44);

  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );

  // Web Crypto expects authTag appended to ciphertext
  const ciphertextWithTag = new Uint8Array(ciphertext.length + authTag.length);
  ciphertextWithTag.set(ciphertext);
  ciphertextWithTag.set(authTag, ciphertext.length);

  const decrypted = await crypto.subtle.decrypt(
    { name: 'AES-GCM', iv: iv },
    key,
    ciphertextWithTag
  );

  return new TextDecoder().decode(decrypted);
}

function initApp() {
  const entries = appData.entradas || [];
  populateStats(entries);
  populateFilters(entries);
  renderCards(entries);

  document.getElementById('search-input').addEventListener('input', () => filterAndRender());
  document.getElementById('filter-category').addEventListener('change', () => filterAndRender());
  document.getElementById('filter-status').addEventListener('change', () => filterAndRender());
}

function populateStats(entries) {
  const total = entries.length;
  const pendientes = entries.filter(e => (e.articulo_publicado || 'pendiente') === 'pendiente').length;
  const publicados = total - pendientes;
  const categorias = new Set(entries.map(e => e.categoria_tematica).filter(Boolean));

  document.getElementById('stats-row').innerHTML =
    '<div class="stat"><div class="stat-val">' + total + '</div><div class="stat-label">Entrevistas</div></div>' +
    '<div class="stat"><div class="stat-val">' + publicados + '</div><div class="stat-label">Publicadas</div></div>' +
    '<div class="stat"><div class="stat-val">' + pendientes + '</div><div class="stat-label">Pendientes</div></div>' +
    '<div class="stat"><div class="stat-val">' + categorias.size + '</div><div class="stat-label">Categorias</div></div>' +
    '<div class="stat"><div class="stat-val">' + appData.ultima_actualizacion + '</div><div class="stat-label">Actualizado</div></div>';
}

function populateFilters(entries) {
  const cats = [...new Set(entries.map(e => e.categoria_tematica).filter(Boolean))].sort();
  const sel = document.getElementById('filter-category');
  cats.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c.charAt(0).toUpperCase() + c.slice(1);
    sel.appendChild(opt);
  });
}

function filterAndRender() {
  const query = document.getElementById('search-input').value.toLowerCase().trim();
  const cat = document.getElementById('filter-category').value;
  const status = document.getElementById('filter-status').value;

  let entries = appData.entradas || [];

  if (cat) entries = entries.filter(e => e.categoria_tematica === cat);
  if (status) entries = entries.filter(e => (e.articulo_publicado || 'pendiente') === status);

  if (query) {
    entries = entries.filter(e => {
      const fields = [
        e.tema || '', e.tema_central || '',
        e.invitado_principal || '', e.invitados || '',
        JSON.stringify(e.ideas_clave || []),
        JSON.stringify(e.pull_quotes || []),
        e.resumen || '',
        e.tesis_principal_invitado || ''
      ].join(' ').toLowerCase();
      return fields.includes(query);
    });
  }

  renderCards(entries);
}

function renderCards(entries) {
  const grid = document.getElementById('cards-grid');
  const noRes = document.getElementById('no-results');

  if (entries.length === 0) {
    grid.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }

  noRes.style.display = 'none';

  grid.innerHTML = entries.map((entry, idx) => {
    const fecha = entry.fecha_emision || '';
    const tema = entry.tema || entry.tema_central || '';
    const invitado = entry.invitado_principal || entry.invitados || '';
    const tesis = entry.tesis_principal_invitado || entry.resumen || '';
    const cat = entry.categoria_tematica || '';
    const statusVal = entry.articulo_publicado || 'pendiente';
    const statusClass = statusVal === 'publicado' ? 'publicado' : 'pendiente';
    const statusLabel = statusVal === 'publicado' ? 'Publicado' : 'Pendiente';
    const dia = entry.dia_semana || '';

    return '<div class="card" onclick=\'openModal(' + JSON.stringify(entry.id) + ')\'>'+
      '<div class="card-date">' + escapeHtml(fecha) + (dia ? ' &mdash; ' + escapeHtml(dia) : '') + '</div>' +
      (cat ? '<span class="card-category">' + escapeHtml(cat) + '</span> ' : '') +
      '<div class="card-tema">' + escapeHtml(tema) + '</div>' +
      '<div class="card-invitado">' + escapeHtml(invitado) + '</div>' +
      '<div class="card-tesis">' + escapeHtml(tesis) + '</div>' +
      '<span class="card-status ' + statusClass + '">' + statusLabel + '</span>' +
    '</div>';
  }).join('');
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openModal(id) {
  const entry = (appData.entradas || []).find(e => e.id === id);
  if (!entry) return;

  const overlay = document.getElementById('modal-overlay');
  const content = document.getElementById('modal-content');

  const fecha = entry.fecha_emision || '';
  const tema = entry.tema || entry.tema_central || '';
  const invitado = entry.invitado_principal || entry.invitados || '';
  const cargo = entry.cargo || '';
  const tesis = entry.tesis_principal_invitado || '';
  const resumen = entry.resumen || '';
  const ideas = entry.ideas_clave || [];
  const datos = entry.datos_duros_principales || [];
  const angulo = entry.angulo_no_explorado || '';
  const pullQuotes = entry.pull_quotes || [];
  const clips = entry.cantidad_clips || 0;
  const tiposClip = entry.tipos_clip || [];
  const cat = entry.categoria_tematica || '';

  // Build ideas from entregables if not in top-level
  let ideasHtml = '';
  if (ideas.length > 0) {
    ideasHtml = '<div class="modal-section"><div class="modal-section-title">Ideas clave</div><ul>' +
      ideas.map(i => '<li>' + escapeHtml(i) + '</li>').join('') + '</ul></div>';
  }

  let datosHtml = '';
  if (datos.length > 0) {
    datosHtml = '<div class="modal-section"><div class="modal-section-title">Datos duros</div><ul>' +
      datos.map(d => '<li>' + escapeHtml(d) + '</li>').join('') + '</ul></div>';
  }

  let quotesHtml = '';
  if (pullQuotes.length > 0) {
    quotesHtml = '<div class="modal-section"><div class="modal-section-title">Citas destacadas</div>' +
      pullQuotes.map(q => '<div class="modal-quote">' + escapeHtml(q) + '</div>').join('') + '</div>';
  }

  let anguloHtml = '';
  if (angulo) {
    anguloHtml = '<div class="modal-section"><div class="modal-section-title">Angulo no explorado</div>' +
      '<div class="modal-text">' + escapeHtml(angulo) + '</div></div>';
  }

  let clipsHtml = '';
  if (clips > 0) {
    clipsHtml = '<div class="modal-section"><div class="modal-section-title">Clips propuestos</div>' +
      '<div class="modal-text">' + clips + ' clips: ' + escapeHtml(tiposClip.join(', ')) + '</div></div>';
  }

  // Build entregables tabs
  const entregables = entry.entregables || {};
  const pasos = Object.keys(entregables).sort();
  let entregablesHtml = '';
  if (pasos.length > 0) {
    const tabs = pasos.map((p, i) => {
      const info = entregables[p];
      return '<button class="entregable-tab' + (i===0?' active':'') + '" onclick="switchEntregable(event, \'' + p + '\')">' +
        escapeHtml(info.tipo || p) + '</button>';
    }).join('');

    const contents = pasos.map((p, i) => {
      const info = entregables[p];
      return '<div class="entregable-content' + (i===0?' active':'') + '" id="entregable-' + p + '">' +
        '<div class="entregable-toolbar">' +
          '<span class="entregable-name">' + escapeHtml(info.archivo || p) + '</span>' +
          '<button class="entregable-download" onclick="downloadEntregable(\'' + escapeHtml(info.archivo || p) + '\', \'' + p + '\')">Descargar .md</button>' +
        '</div>' +
        '<div class="entregable-body">' + escapeHtml(info.contenido || '(Sin contenido)') + '</div>' +
      '</div>';
    }).join('');

    entregablesHtml = '<div class="modal-section"><div class="modal-section-title">Entregables del pipeline</div>' +
      '<div class="entregables-tabs">' + tabs + '</div>' + contents + '</div>';
  }

  // For entry 1 (ecometropoli), get ideas from step 3 if not at top level
  let extraIdeasHtml = '';
  if (ideas.length === 0 && entregables.paso3 && entregables.paso3.contenido) {
    // Try to extract ideas from the analysis
    const contenido = entregables.paso3.contenido;
    const ideasMatch = contenido.match(/## Ideas clave[\s\S]*?(?=\n## |$)/);
    if (ideasMatch) {
      const lines = ideasMatch[0].split('\n').filter(l => l.match(/^\d+\./));
      if (lines.length > 0) {
        extraIdeasHtml = '<div class="modal-section"><div class="modal-section-title">Ideas clave</div><ul>' +
          lines.map(l => '<li>' + escapeHtml(l.replace(/^\d+\.\s*\*\*/, '').replace(/\*\*/g, '')) + '</li>').join('') + '</ul></div>';
      }
    }
  }

  content.innerHTML =
    '<div class="modal-header">' +
      '<button class="modal-close" onclick="closeModal()">&times;</button>' +
      '<div class="modal-title">' + escapeHtml(tema) + '</div>' +
      '<div class="modal-meta">' +
        escapeHtml(fecha) + ' &mdash; ' + escapeHtml(invitado) +
        (cargo ? ' (' + escapeHtml(cargo) + ')' : '') +
        (cat ? ' &mdash; ' + escapeHtml(cat) : '') +
      '</div>' +
    '</div>' +
    '<div class="modal-body">' +
      (resumen ? '<div class="modal-section"><div class="modal-section-title">Resumen</div><div class="modal-text">' + escapeHtml(resumen) + '</div></div>' : '') +
      (tesis ? '<div class="modal-section"><div class="modal-section-title">Tesis principal</div><div class="modal-text">' + escapeHtml(tesis) + '</div></div>' : '') +
      ideasHtml +
      extraIdeasHtml +
      datosHtml +
      quotesHtml +
      anguloHtml +
      clipsHtml +
      entregablesHtml +
    '</div>';

  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';

  // Store current entry for downloads
  window._currentEntry = entry;
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  document.body.style.overflow = '';
}

function closeModalOutside(event) {
  if (event.target === document.getElementById('modal-overlay')) closeModal();
}

function switchEntregable(event, paso) {
  // Deactivate all tabs and contents in this modal section
  const parent = event.target.closest('.modal-section');
  parent.querySelectorAll('.entregable-tab').forEach(t => t.classList.remove('active'));
  parent.querySelectorAll('.entregable-content').forEach(c => c.classList.remove('active'));

  event.target.classList.add('active');
  const content = parent.querySelector('#entregable-' + paso);
  if (content) content.classList.add('active');
}

function downloadEntregable(filename, paso) {
  const entry = window._currentEntry;
  if (!entry || !entry.entregables || !entry.entregables[paso]) return;

  const contenido = entry.entregables[paso].contenido || '';
  const blob = new Blob([contenido], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Escape key to close modal
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});
</script>
