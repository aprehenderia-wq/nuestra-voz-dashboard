<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestra Voz — Dashboard Editorial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --fondo: #f2e0bc;
  --texto: #1c1c1c;
  --rojo: #f65449;
  --verde: #029e75;
  --texto-sobre-rojo: #ffffff;
  --card: #f7ebce;
  --card-hover: #f3e4c4;
  --overlay: rgba(28,28,28,0.7);
  --border: rgba(28,28,28,0.12);
  --shadow: 0 2px 8px rgba(28,28,28,0.08), 0 1px 3px rgba(28,28,28,0.06);
  --shadow-lg: 0 20px 50px rgba(28,28,28,0.25);
  --radius: 14px;
  --radius-sm: 8px;
}

html, body {
  height: 100%;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--fondo);
  color: var(--texto);
  line-height: 1.6;
  min-height: 100vh;
}

.top-bar {
  height: 6px;
  width: 100%;
  background: var(--rojo);
}

a { color: var(--rojo); }

/* ===== LOGIN SCREEN ===== */
#login-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: var(--fondo);
  padding: 20px;
}

.login-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 48px 40px;
  max-width: 420px;
  width: 100%;
  box-shadow: var(--shadow-lg);
  text-align: center;
}

.login-accent {
  width: 48px;
  height: 6px;
  background: var(--rojo);
  border-radius: 4px;
  margin: 0 auto 20px;
}

.login-logo {
  font-size: 1.7rem;
  font-weight: 800;
  color: var(--texto);
  margin-bottom: 6px;
  letter-spacing: -0.5px;
}

.login-subtitle {
  color: #5a5044;
  font-size: 0.92rem;
  margin-bottom: 32px;
  font-weight: 400;
}

.login-box input {
  width: 100%;
  padding: 14px 18px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 1rem;
  font-family: inherit;
  outline: none;
  background: #fffaf0;
  color: var(--texto);
  transition: border-color 0.2s ease;
  margin-bottom: 16px;
}

.login-box input:focus {
  border-color: var(--rojo);
}

.login-box button {
  width: 100%;
  padding: 14px;
  background: var(--rojo);
  color: var(--texto-sobre-rojo);
  border: none;
  border-radius: var(--radius-sm);
  font-size: 1rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.2s ease, transform 0.1s ease;
}

.login-box button:hover { background: #e0392f; transform: translateY(-1px); }
.login-box button:active { transform: translateY(0); }
.login-box button:disabled { opacity: 0.6; cursor: default; transform: none; }

.login-error {
  color: var(--rojo);
  font-size: 0.875rem;
  margin-top: 12px;
  min-height: 20px;
  font-weight: 600;
}

.login-loading {
  display: none;
  color: #5a5044;
  font-size: 0.875rem;
  margin-top: 12px;
}

/* ===== MAIN APP ===== */
#app { display: none; }

header.app-header {
  padding: 32px 24px 20px;
  max-width: 1300px;
  margin: 0 auto;
}

.app-title {
  font-size: 1.9rem;
  font-weight: 800;
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.app-title .dot { color: var(--rojo); }

.app-subtitle {
  color: #5a5044;
  font-size: 0.95rem;
  margin-top: 4px;
  font-weight: 500;
}

.stats-row {
  display: flex;
  gap: 28px;
  margin-top: 18px;
  flex-wrap: wrap;
}

.stat {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 18px;
  min-width: 110px;
}

.stat-val {
  font-size: 1.3rem;
  font-weight: 800;
}

.stat-label {
  font-size: 0.75rem;
  color: #5a5044;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  font-weight: 600;
}

/* ===== TABS ===== */
.tabs-nav {
  max-width: 1300px;
  margin: 18px auto 0;
  padding: 0 24px;
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--border);
}

.tab-btn {
  padding: 12px 22px;
  background: none;
  border: none;
  font-family: inherit;
  font-size: 0.95rem;
  font-weight: 600;
  color: #5a5044;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  margin-bottom: -1px;
  transition: color 0.15s ease, border-color 0.15s ease;
}

.tab-btn:hover { color: var(--texto); }

.tab-btn.active {
  color: var(--texto);
  font-weight: 700;
  border-bottom-color: var(--rojo);
}

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ===== TOOLBAR ===== */
.toolbar {
  max-width: 1300px;
  margin: 0 auto;
  padding: 8px 24px 20px;
}

.search-box {
  position: relative;
  margin-bottom: 14px;
}

.search-box input {
  width: 100%;
  padding: 13px 16px 13px 44px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 0.95rem;
  font-family: inherit;
  outline: none;
  background: var(--card);
  color: var(--texto);
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

.search-box input:focus {
  border-color: var(--rojo);
  box-shadow: 0 0 0 3px rgba(246, 84, 73, 0.15);
}

.search-box .icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 1.05rem;
  opacity: 0.55;
}

.filters-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  margin-bottom: 10px;
}

.chip-group {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.chip {
  padding: 7px 14px;
  border-radius: 999px;
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--texto);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  user-select: none;
  transition: all 0.15s ease;
}

.chip:hover { border-color: var(--rojo); }

.chip.active {
  background: var(--rojo);
  border-color: var(--rojo);
  color: var(--texto-sobre-rojo);
}

.date-range {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.82rem;
  font-weight: 600;
  color: #5a5044;
  flex-wrap: wrap;
}

.date-range input[type="date"] {
  padding: 7px 10px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 0.82rem;
  background: var(--card);
  color: var(--texto);
}

.clear-btn {
  padding: 7px 14px;
  border-radius: 999px;
  border: 1.5px solid var(--rojo);
  background: transparent;
  color: var(--rojo);
  font-size: 0.82rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s ease;
}

.clear-btn:hover { background: var(--rojo); color: var(--texto-sobre-rojo); }

.results-count {
  font-size: 0.85rem;
  color: #5a5044;
  font-weight: 500;
  margin-top: 4px;
}

/* ===== CARDS ===== */
.cards-grid {
  max-width: 1300px;
  margin: 0 auto;
  padding: 10px 24px 40px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 18px;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  cursor: pointer;
  transition: box-shadow 0.2s ease, transform 0.2s ease, background 0.2s ease;
}

.card:hover {
  box-shadow: var(--shadow-lg);
  transform: translateY(-3px);
  background: var(--card-hover);
}

.card-header {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
}

.card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}

.badge {
  font-size: 0.68rem;
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.badge-day {
  background: rgba(2,158,117,0.12);
  color: var(--verde);
}

.badge-date {
  background: rgba(28,28,28,0.08);
  color: var(--texto);
}

.card-title {
  font-size: 1.08rem;
  font-weight: 700;
  line-height: 1.4;
  margin-bottom: 6px;
}

.card-guest {
  font-size: 0.85rem;
  color: #5a5044;
  font-weight: 500;
}

.card-body {
  padding: 14px 20px 18px;
}

.card-summary {
  font-size: 0.9rem;
  color: var(--texto);
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-expand-hint {
  padding: 10px 20px;
  background: rgba(28,28,28,0.04);
  text-align: center;
  font-size: 0.78rem;
  color: #5a5044;
  font-weight: 600;
  border-top: 1px solid var(--border);
}

/* ===== EXPANDED CARD (entregables) ===== */
.card.expanded .card-expand-hint { display: none; }

.entregables-panel {
  display: none;
  padding: 16px 20px 20px;
  border-top: 1px dashed var(--border);
  background: rgba(28,28,28,0.03);
}

.card.expanded .entregables-panel { display: block; }

.entregables-title {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 700;
  color: #5a5044;
  margin-bottom: 10px;
}

.entregables-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 8px;
}

.entregable-btn {
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: #fffaf0;
  color: var(--texto);
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  text-align: left;
  transition: all 0.15s ease;
}

.entregable-btn:hover {
  border-color: var(--verde);
  color: var(--verde);
}

.entregable-btn .paso-num {
  display: block;
  font-size: 0.68rem;
  color: var(--rojo);
  font-weight: 800;
  text-transform: uppercase;
  margin-bottom: 2px;
}

/* ===== FICHAS RAPIDAS ===== */
.fichas-toolbar {
  max-width: 1300px;
  margin: 0 auto;
  padding: 20px 24px 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}

.fichas-toolbar select,
.fichas-toolbar input[type="text"] {
  padding: 10px 14px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 0.86rem;
  background: var(--card);
  color: var(--texto);
  outline: none;
  transition: border-color 0.2s ease;
}

.fichas-toolbar select:focus,
.fichas-toolbar input[type="text"]:focus {
  border-color: var(--rojo);
}

.fichas-toolbar select {
  min-width: 220px;
  cursor: pointer;
}

.fichas-toolbar input[type="text"] {
  flex: 1 1 220px;
  min-width: 180px;
}

.fichas-results-row {
  max-width: 1300px;
  margin: 0 auto;
  padding: 0 24px;
}

.fichas-list {
  max-width: 1300px;
  margin: 0 auto;
  padding: 10px 24px 40px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.ficha-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}

.ficha-card-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(28,28,28,0.02);
}

.ficha-card-header .card-title {
  font-family: 'Source Serif 4', Georgia, serif;
}

.ficha-card-body {
  padding: 22px 26px 26px;
  max-height: 480px;
  overflow-y: auto;
  transition: max-height 0.25s ease;
}

.ficha-card-body.expanded {
  max-height: none;
}

.ficha-expand-wrap {
  padding: 10px 20px;
  background: rgba(28,28,28,0.04);
  text-align: center;
  border-top: 1px solid var(--border);
}

.ficha-expand-btn {
  background: none;
  border: none;
  font-family: inherit;
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--rojo);
  cursor: pointer;
  padding: 4px 10px;
}

.ficha-expand-btn:hover { text-decoration: underline; }

/* ===== MODAL ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--overlay);
  z-index: 300;
  overflow-y: auto;
  padding: 30px 16px;
}

.modal-overlay.active {
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

.modal {
  background: #fffaf0;
  border-radius: var(--radius);
  max-width: 860px;
  width: 100%;
  margin: 10px auto;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  animation: modalIn 0.2s ease;
}

@keyframes modalIn {
  from { opacity: 0; transform: translateY(16px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-header {
  position: sticky;
  top: 0;
  background: var(--rojo);
  color: var(--texto-sobre-rojo);
  padding: 18px 56px 18px 24px;
}

.modal-header .modal-tipo {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  font-weight: 700;
  opacity: 0.9;
}

.modal-header .modal-archivo {
  font-size: 0.95rem;
  font-weight: 700;
  margin-top: 4px;
}

.modal-close {
  position: absolute;
  top: 14px;
  right: 18px;
  background: rgba(255,255,255,0.18);
  border: none;
  color: var(--texto-sobre-rojo);
  font-size: 1.3rem;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  cursor: pointer;
  line-height: 1;
  transition: background 0.15s ease;
}

.modal-close:hover { background: rgba(255,255,255,0.32); }

.modal-body {
  padding: 26px 30px 34px;
  max-height: 72vh;
  overflow-y: auto;
}

/* ===== MARKDOWN RENDERING ===== */
.md h1, .md h2, .md h3, .md h4 {
  font-family: 'Source Serif 4', Georgia, serif;
  color: var(--texto);
  margin: 22px 0 10px;
  line-height: 1.3;
}
.md h1 { font-size: 1.6rem; border-bottom: 3px solid var(--rojo); padding-bottom: 8px; }
.md h2 { font-size: 1.3rem; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
.md h3 { font-size: 1.12rem; color: var(--verde); }
.md h4 { font-size: 1rem; }
.md p { margin: 10px 0; font-size: 0.95rem; }
.md ul, .md ol { margin: 10px 0 10px 24px; font-size: 0.95rem; }
.md li { margin: 4px 0; }
.md strong { font-weight: 700; }
.md em { font-style: italic; }
.md blockquote {
  border-left: 4px solid var(--verde);
  background: rgba(2,158,117,0.08);
  padding: 10px 16px;
  margin: 14px 0;
  font-size: 0.92rem;
  border-radius: 0 6px 6px 0;
}
.md hr {
  border: none;
  border-top: 2px solid var(--border);
  margin: 22px 0;
}
.md code {
  background: rgba(28,28,28,0.08);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'SFMono-Regular', Consolas, monospace;
  font-size: 0.85rem;
}
.md pre {
  background: #1c1c1c;
  color: #f2e0bc;
  padding: 14px 16px;
  border-radius: 8px;
  overflow-x: auto;
  margin: 14px 0;
}
.md pre code { background: none; padding: 0; color: inherit; }
.md table {
  border-collapse: collapse;
  width: 100%;
  margin: 14px 0;
  font-size: 0.86rem;
}
.md th, .md td {
  border: 1px solid var(--border);
  padding: 8px 10px;
  text-align: left;
  vertical-align: top;
}
.md th {
  background: rgba(246,84,73,0.1);
  font-weight: 700;
}
.md tr:nth-child(even) td { background: rgba(28,28,28,0.03); }

/* ===== FOOTER ===== */
footer {
  max-width: 1300px;
  margin: 0 auto;
  padding: 24px 24px 40px;
  text-align: center;
  color: #5a5044;
  font-size: 0.82rem;
  border-top: 1px solid var(--border);
}

footer .footer-strong { font-weight: 700; color: var(--texto); }

.no-results {
  text-align: center;
  padding: 60px 20px;
  color: #5a5044;
  font-size: 0.95rem;
  grid-column: 1 / -1;
}

.no-results .icon { font-size: 2.4rem; display: block; margin-bottom: 10px; }

@media (max-width: 640px) {
  .cards-grid { grid-template-columns: 1fr; }
  .modal-body { padding: 18px 18px 26px; }
  .app-title { font-size: 1.5rem; }
  .tabs-nav { gap: 0; }
  .tab-btn { padding: 10px 14px; font-size: 0.85rem; }
}
</style>
</head>
<body>

<div class="top-bar"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-accent"></div>
    <div class="login-logo">Nuestra Voz</div>
    <div class="login-subtitle">Dashboard Editorial &middot; acceso protegido</div>
    <input type="password" id="password-input" placeholder="Contraseña" autofocus>
    <button id="login-btn" onclick="attemptLogin()">Ingresar</button>
    <div class="login-error" id="login-error"></div>
    <div class="login-loading" id="login-loading">Descifrando datos...</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="app-header">
    <div class="app-title"><span class="dot">&#9679;</span> Nuestra Voz — Dashboard Editorial</div>
    <div class="app-subtitle">Pipeline de repurposing · ameliarueda.com</div>
    <div class="stats-row">
      <div class="stat"><div class="stat-val" id="stat-total">0</div><div class="stat-label">Entrevistas</div></div>
      <div class="stat"><div class="stat-val" id="stat-shown">0</div><div class="stat-label">Mostradas</div></div>
    </div>
  </header>

  <nav class="tabs-nav">
    <button class="tab-btn active" id="tab-btn-completos" onclick="switchTab('completos')">Entregables completos</button>
    <button class="tab-btn" id="tab-btn-fichas" onclick="switchTab('fichas')">Fichas rápidas</button>
  </nav>

  <!-- TAB: ENTREGABLES COMPLETOS -->
  <div class="tab-panel active" id="tab-completos">
    <div class="toolbar">
      <div class="search-box">
        <span class="icon">&#128269;</span>
        <input type="text" id="search-input" placeholder="Buscar por tema, invitado, resumen o contenido...">
      </div>
      <div class="filters-row">
        <div class="chip-group" id="day-chips"></div>
      </div>
      <div class="filters-row">
        <div class="date-range">
          <span>Desde</span>
          <input type="date" id="date-from">
          <span>Hasta</span>
          <input type="date" id="date-to">
        </div>
        <button class="clear-btn" onclick="clearFilters()">Limpiar filtros</button>
      </div>
      <div class="results-count" id="results-count"></div>
    </div>

    <div class="cards-grid" id="cards-grid"></div>
  </div>

  <!-- TAB: FICHAS RAPIDAS -->
  <div class="tab-panel" id="tab-fichas">
    <div class="fichas-toolbar">
      <select id="ficha-invitado-filter">
        <option value="">Todos los entrevistados</option>
      </select>
      <input type="text" id="ficha-tema-filter" placeholder="Filtrar por tema...">
      <div class="date-range">
        <span>Desde</span>
        <input type="date" id="ficha-date-from">
        <span>Hasta</span>
        <input type="date" id="ficha-date-to">
      </div>
      <button class="clear-btn" onclick="clearFichaFilters()">Limpiar filtros</button>
    </div>
    <div class="fichas-results-row">
      <div class="results-count" id="fichas-results-count"></div>
    </div>

    <div class="fichas-list" id="fichas-list"></div>
  </div>

  <footer>
    <div><span class="footer-strong">Nuestra Voz</span> — Generado automáticamente por el pipeline de repurposing de Nuestra Voz</div>
    <div id="last-update" style="margin-top:4px;"></div>
  </footer>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal" onclick="event.stopPropagation()">

// ===================== CRYPTO =====================
function b64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
}

async function decryptData(password, encB64, saltB64, ivB64) {
  const salt = b64ToBytes(saltB64);
  const iv = b64ToBytes(ivB64);
  const ciphertext = b64ToBytes(encB64);
  const key = await deriveKey(password, salt);
  const decrypted = await crypto.subtle.decrypt(
    { name: 'AES-GCM', iv: iv },
    key,
    ciphertext
  );
  return new TextDecoder().decode(decrypted);
}

// ===================== MARKDOWN CONVERTER =====================
function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function inlineMd(text) {
  let t = escapeHtml(text);
  // inline code
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  // bold+italic ***text***
  t = t.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
  // bold **text** or __text__
  t = t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/__([^_]+)__/g, '<strong>$1</strong>');
  // italic *text* or _text_
  t = t.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
  t = t.replace(/(^|[^_])_([^_\n]+)_(?!_)/g, '$1<em>$2</em>');
  // links [text](url)
  t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return t;
}

function isTableSeparator(line) {
  return /^\s*\|?\s*:?-{2,}:?\s*(\|\s*:?-{2,}:?\s*)*\|?\s*$/.test(line) && line.includes('-');
}

function splitTableRow(line) {
  let l = line.trim();
  if (l.startsWith('|')) l = l.slice(1);
  if (l.endsWith('|')) l = l.slice(0, -1);
  return l.split('|').map(c => c.trim());
}

function mdToHtml(md) {
  const lines = md.replace(/\r\n/g, '\n').split('\n');
  let html = '';
  let i = 0;
  let paragraphBuf = [];

  function flushParagraph() {
    if (paragraphBuf.length) {
      html += '<p>' + inlineMd(paragraphBuf.join(' ')) + '</p>';
      paragraphBuf = [];
    }
  }

  while (i < lines.length) {
    const line = lines[i];
    const trimmed = line.trim();

    // code fence
    if (/^```/.test(trimmed)) {
      flushParagraph();
      const codeLines = [];
      i++;
      while (i < lines.length && !/^```/.test(lines[i].trim())) {
        codeLines.push(lines[i]);
        i++;
      }
      i++; // skip closing fence
      html += '<pre><code>' + escapeHtml(codeLines.join('\n')) + '</code></pre>';
      continue;
    }

    // horizontal rule
    if (/^(-{3,}|\*{3,}|_{3,})$/.test(trimmed)) {
      flushParagraph();
      html += '<hr>';
      i++;
      continue;
    }

    // headers
    const headerMatch = /^(#{1,6})\s+(.*)$/.exec(trimmed);
    if (headerMatch) {
      flushParagraph();
      const level = Math.min(headerMatch[1].length, 4);
      html += `<h${level}>${inlineMd(headerMatch[2])}</h${level}>`;
      i++;
      continue;
    }

    // blockquote
    if (/^>\s?/.test(trimmed)) {
      flushParagraph();
      const quoteLines = [];
      while (i < lines.length && /^>\s?/.test(lines[i].trim())) {
        quoteLines.push(lines[i].trim().replace(/^>\s?/, ''));
        i++;
      }
      html += '<blockquote>' + quoteLines.map(l => inlineMd(l)).join('<br>') + '</blockquote>';
      continue;
    }

    // table
    if (trimmed.startsWith('|') && i + 1 < lines.length && isTableSeparator(lines[i + 1].trim())) {
      flushParagraph();
      const headerCells = splitTableRow(trimmed);
      i += 2;
      const bodyRows = [];
      while (i < lines.length && lines[i].trim().startsWith('|')) {
        bodyRows.push(splitTableRow(lines[i].trim()));
        i++;
      }
      html += '<table><thead><tr>' +
        headerCells.map(c => `<th>${inlineMd(c)}</th>`).join('') +
        '</tr></thead><tbody>' +
        bodyRows.map(r => '<tr>' + r.map(c => `<td>${inlineMd(c)}</td>`).join('') + '</tr>').join('') +
        '</tbody></table>';
      continue;
    }

    // unordered list
    if (/^[-*]\s+/.test(trimmed)) {
      flushParagraph();
      const items = [];
      while (i < lines.length && /^[-*]\s+/.test(lines[i].trim())) {
        items.push(lines[i].trim().replace(/^[-*]\s+/, ''));
        i++;
      }
      html += '<ul>' + items.map(it => `<li>${inlineMd(it)}</li>`).join('') + '</ul>';
      continue;
    }

    // ordered list
    if (/^\d+\.\s+/.test(trimmed)) {
      flushParagraph();
      const items = [];
      while (i < lines.length && /^\d+\.\s+/.test(lines[i].trim())) {
        items.push(lines[i].trim().replace(/^\d+\.\s+/, ''));
        i++;
      }
      html += '<ol>' + items.map(it => `<li>${inlineMd(it)}</li>`).join('') + '</ol>';
      continue;
    }

    // blank line
    if (trimmed === '') {
      flushParagraph();
      i++;
      continue;
    }

    // paragraph text
    paragraphBuf.push(trimmed);
    i++;
  }
  flushParagraph();
  return html;
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-btn-completos').classList.toggle('active', tab === 'completos');
  document.getElementById('tab-btn-fichas').classList.toggle('active', tab === 'fichas');
  document.getElementById('tab-completos').classList.toggle('active', tab === 'completos');
  document.getElementById('tab-fichas').classList.toggle('active', tab === 'fichas');
}

function buildDayChips() {
  const container = document.getElementById('day-chips');
  const days = [...new Set(dashboardData.map(d => d.dia_semana).filter(Boolean))];
  days.sort((a, b) => DAY_ORDER.indexOf(a.toLowerCase()) - DAY_ORDER.indexOf(b.toLowerCase()));
  container.innerHTML = '';
  const allChip = document.createElement('div');
  allChip.className = 'chip active';
  allChip.textContent = 'Todos los días';
  allChip.onclick = () => { dayFilter = null; renderCards(); refreshChips(); };
  container.appendChild(allChip);
  days.forEach(day => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = day.charAt(0).toUpperCase() + day.slice(1);
    chip.dataset.day = day;
    chip.onclick = () => { dayFilter = dayFilter === day ? null : day; renderCards(); refreshChips(); };
    container.appendChild(chip);
  });
}

function refreshChips() {
  const chips = document.querySelectorAll('#day-chips .chip');
  chips.forEach(chip => {
    if (!chip.dataset.day) {
      chip.classList.toggle('active', dayFilter === null);
    } else {
      chip.classList.toggle('active', chip.dataset.day === dayFilter);
    }
  });
}

function updateStats() {
  document.getElementById('stat-total').textContent = dashboardData.length;
}

function getFilteredData() {
  const search = document.getElementById('search-input').value.toLowerCase().trim();
  const dateFrom = document.getElementById('date-from').value;
  const dateTo = document.getElementById('date-to').value;

  return dashboardData.filter(item => {
    if (dayFilter && item.dia_semana !== dayFilter) return false;
    if (dateFrom && item.fecha_emision < dateFrom) return false;
    if (dateTo && item.fecha_emision > dateTo) return false;
    if (search) {
      const entregablesText = Object.values(item.entregables || {})
        .map(e => e.contenido || '').join(' ');
      const searchIn = [
        item.tema, item.invitado_principal, item.cargo, item.resumen,
        item.conductora, item.programa, entregablesText
      ].join(' ').toLowerCase();
      if (!searchIn.includes(search)) return false;
    }
    return true;
  });
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('es-CR', { day: 'numeric', month: 'long', year: 'numeric' });
}

function clearFilters() {
  document.getElementById('search-input').value = '';
  document.getElementById('date-from').value = '';
  document.getElementById('date-to').value = '';
  dayFilter = null;
  refreshChips();
  renderCards();
}

const PASO_ORDER = ['paso1', 'paso2', 'paso3', 'paso4', 'paso5', 'paso6'];

function renderCards() {
  const filtered = getFilteredData();
  const grid = document.getElementById('cards-grid');
  const countEl = document.getElementById('results-count');

  document.getElementById('stat-shown').textContent = filtered.length;
  countEl.textContent = `Mostrando ${filtered.length} de ${dashboardData.length} entrevistas`;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results"><span class="icon">&#128269;</span>No se encontraron entrevistas con esos criterios.</div>';
    return;
  }

  grid.innerHTML = filtered.map((item) => {
    const origIdx = dashboardData.indexOf(item);
    const entregablesButtons = PASO_ORDER
      .filter(p => item.entregables && item.entregables[p])
      .map(p => {
        const e = item.entregables[p];
        return `<button class="entregable-btn" onclick="openEntregable(event, ${origIdx}, '${p}')">
          <span class="paso-num">${p.replace('paso', 'Paso ')}</span>${e.tipo}
        </button>`;
      }).join('');

    return `
    <div class="card" id="card-${origIdx}" onclick="toggleCard(${origIdx})">
      <div class="card-header">
        <div class="card-meta">
          <span class="badge badge-day">${item.dia_semana || ''}</span>
          <span class="badge badge-date">${formatDate(item.fecha_emision)}</span>
        </div>
        <div class="card-title">${item.tema || ''}</div>
        <div class="card-guest">${item.invitado_principal || ''}${item.cargo ? ' — ' + item.cargo : ''}</div>
      </div>
      <div class="card-body">
        <div class="card-summary">${item.resumen || ''}</div>
      </div>
      <div class="card-expand-hint">Clic para ver los 6 entregables</div>
      <div class="entregables-panel">
        <div class="entregables-title">Entregables del pipeline</div>
        <div class="entregables-grid">${entregablesButtons}</div>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(idx) {
  const card = document.getElementById('card-' + idx);
  card.classList.toggle('expanded');
}

function openEntregable(event, idx, paso) {
  event.stopPropagation();
  const item = dashboardData[idx];
  const entregable = item.entregables[paso];
  document.getElementById('modal-tipo').textContent = paso.replace('paso', 'Paso ') + ' · ' + entregable.tipo;
  document.getElementById('modal-archivo').textContent = entregable.archivo;
  document.getElementById('modal-body').innerHTML = mdToHtml(entregable.contenido || '');
  document.getElementById('modal-overlay').classList.add('active');
  document.getElementById('modal-body').scrollTop = 0;
}

function closeModal(event) {
  if (event.target.id === 'modal-overlay') closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('active');
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModalDirect();
});

// ===================== FICHAS RAPIDAS =====================
function buildFichaInvitadoOptions() {
  const select = document.getElementById('ficha-invitado-filter');
  const invitados = [...new Set(
    dashboardData
      .filter(d => d.entregables && d.entregables.paso2)
      .map(d => d.invitado_principal)
      .filter(Boolean)
  )].sort((a, b) => a.localeCompare(b, 'es'));

  select.innerHTML = '<option value="">Todos los entrevistados</option>' +
    invitados.map(inv => `<option value="${escapeHtml(inv)}">${inv}</option>`).join('');
}

function getFilteredFichasData() {
  const invitado = document.getElementById('ficha-invitado-filter').value;
  const tema = document.getElementById('ficha-tema-filter').value.toLowerCase().trim();
  const dateFrom = document.getElementById('ficha-date-from').value;
  const dateTo = document.getElementById('ficha-date-to').value;

  return dashboardData.filter(item => {
    if (!item.entregables || !item.entregables.paso2) return false;
    if (invitado && item.invitado_principal !== invitado) return false;
    if (tema && !(item.tema || '').toLowerCase().includes(tema)) return false;
    if (dateFrom && item.fecha_emision < dateFrom) return false;
    if (dateTo && item.fecha_emision > dateTo) return false;
    return true;
  });
}

function clearFichaFilters() {
  document.getElementById('ficha-invitado-filter').value = '';
  document.getElementById('ficha-tema-filter').value = '';
  document.getElementById('ficha-date-from').value = '';
  document.getElementById('ficha-date-to').value = '';
  renderFichas();
}

function renderFichas() {
  const filtered = getFilteredFichasData();
  const list = document.getElementById('fichas-list');
  const countEl = document.getElementById('fichas-results-count');
  const totalConFichas = dashboardData.filter(d => d.entregables && d.entregables.paso2).length;

  countEl.textContent = `Mostrando ${filtered.length} de ${totalConFichas} fichas rápidas`;

  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results"><span class="icon">&#128269;</span>No se encontraron fichas rápidas con esos criterios.</div>';
    return;
  }

  list.innerHTML = filtered.map((item) => {
    const origIdx = dashboardData.indexOf(item);
    const paso2 = item.entregables.paso2;
    return `
    <div class="ficha-card" id="ficha-card-${origIdx}">
      <div class="ficha-card-header">
        <div class="card-meta">
          <span class="badge badge-day">${item.dia_semana || ''}</span>
          <span class="badge badge-date">${formatDate(item.fecha_emision)}</span>
        </div>
        <div class="card-title">${item.tema || ''}</div>
        <div class="card-guest">${item.invitado_principal || ''}${item.cargo ? ' — ' + item.cargo : ''}</div>
      </div>
      <div class="ficha-card-body md" id="ficha-body-${origIdx}">${mdToHtml(paso2.contenido || '')}</div>
      <div class="ficha-expand-wrap">
        <button class="ficha-expand-btn" id="ficha-expand-btn-${origIdx}" onclick="toggleFichaExpand(${origIdx})">Expandir ficha</button>
      </div>
    </div>`;
  }).join('');
}

function toggleFichaExpand(idx) {
  const body = document.getElementById('ficha-body-' + idx);
  const btn = document.getElementById('ficha-expand-btn-' + idx);
  const isExpanded = body.classList.toggle('expanded');
  btn.textContent = isExpanded ? 'Contraer ficha' : 'Expandir ficha';
}
</script>
