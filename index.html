<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NV Dashboard Editorial</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--fondo:#f2e0bc;--texto:#1c1c1c;--rojo:#f65449;--verde:#029e75;
--blanco:#ffffff;--muted:#7a7060;--border:#d4c9a8;--cardBg:#faf3e3;
--headerBg:#1c1c1c;--shadow:0 2px 8px rgba(0,0,0,0.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--fondo);color:var(--texto);line-height:1.5;min-height:100vh}
a{color:var(--rojo);text-decoration:none}

/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--cardBg);border:1px solid var(--border);border-radius:12px;padding:40px;max-width:400px;width:100%;text-align:center;box-shadow:var(--shadow)}
.login-box h1{font-size:28px;margin-bottom:8px}
.login-box h1 .nv{color:var(--rojo);font-weight:800}
.login-box p{color:var(--muted);margin-bottom:24px;font-size:14px}
.login-box input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:8px;font-size:16px;background:var(--blanco);margin-bottom:16px;outline:none}
.login-box input:focus{border-color:var(--rojo)}
.login-box button{width:100%;padding:12px;background:var(--rojo);color:var(--blanco);border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:opacity .2s}
.login-box button:hover{opacity:.9}
.login-error{color:var(--rojo);font-size:13px;margin-top:8px;display:none}
.login-loading{display:none;color:var(--muted);font-size:13px;margin-top:8px}

/* HEADER */
.header{background:var(--headerBg);padding:16px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.header .nv-logo{color:var(--rojo);font-size:28px;font-weight:800;letter-spacing:-1px}
.header .title{color:var(--blanco);font-size:18px;font-weight:600}
.header .subtitle{color:var(--muted);font-size:13px;margin-left:auto}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);background:var(--cardBg);padding:0 24px}
.tab-btn{padding:12px 24px;font-size:15px;font-weight:600;border:none;background:none;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab-btn.active{color:var(--rojo);border-bottom-color:var(--rojo)}
.tab-btn:hover{color:var(--texto)}
.tab-content{display:none;padding:24px}
.tab-content.active{display:block}

/* PROGRAMAS CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(440px,1fr));gap:20px;max-width:1200px;margin:0 auto}
.prog-card{background:var(--cardBg);border:1px solid var(--border);border-radius:12px;padding:24px;box-shadow:var(--shadow);transition:transform .15s}
.prog-card:hover{transform:translateY(-2px)}
.prog-card .meta{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.prog-card .meta .fecha{font-size:13px;color:var(--muted)}
.prog-card .meta .version{font-size:11px;background:var(--texto);color:var(--blanco);padding:2px 8px;border-radius:4px;font-weight:600}
.prog-card h3{font-size:17px;margin-bottom:4px;line-height:1.3}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600}
.badge-completado{background:#e8f5e9;color:var(--verde)}
.badge-alto{background:#fce4ec;color:var(--rojo)}
.badge-medio{background:#fff3e0;color:#e65100}
.badge-medio-alto{background:#fff8e1;color:#f57f17}
.badge-bajo{background:#e0e0e0;color:#616161}
.badge-cat{background:var(--headerBg);color:var(--blanco);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.badge-repurposing{background:var(--rojo);color:var(--blanco);font-size:11px}
.prog-card .invitado{color:var(--muted);font-size:14px;margin:4px 0 12px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}
.stat-box{background:var(--fondo);border-radius:8px;padding:10px;text-align:center}
.stat-box .val{font-size:20px;font-weight:700;color:var(--texto)}
.stat-box .label{font-size:11px;color:var(--muted);margin-top:2px}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0}
.pill{background:var(--fondo);border:1px solid var(--border);padding:4px 10px;border-radius:16px;font-size:12px;color:var(--muted)}
.btn-entregables{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:var(--rojo);color:var(--blanco);border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity .2s}
.btn-entregables:hover{opacity:.85}

/* FICHAS TAB */
.fichas-filters{display:flex;gap:12px;flex-wrap:wrap;align-items:center;max-width:1200px;margin:0 auto 20px}
.fichas-filters input,.fichas-filters select{padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--blanco);outline:none}
.fichas-filters input{flex:1;min-width:200px}
.fichas-filters input:focus,.fichas-filters select:focus{border-color:var(--rojo)}
.fichas-filters select{min-width:150px}
.results-count{font-size:13px;color:var(--muted);margin-left:auto;white-space:nowrap}
.fichas-list{max-width:1200px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
.ficha-card{background:var(--cardBg);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow);border-left:4px solid var(--border);transition:border-color .2s}
.ficha-card.has-repurposing{border-left-color:var(--rojo)}
.ficha-header{padding:16px 20px;cursor:pointer;display:flex;align-items:center;gap:12px;flex-wrap:wrap;user-select:none}
.ficha-header:hover{background:rgba(0,0,0,.02)}
.ficha-header .arrow{font-size:12px;color:var(--muted);transition:transform .2s;flex-shrink:0}
.ficha-card.open .ficha-header .arrow{transform:rotate(90deg)}
.ficha-header .tema{font-weight:600;font-size:15px;flex:1;min-width:200px}
.ficha-header .badges{display:flex;gap:6px;flex-wrap:wrap}
.ficha-header .fecha-sm{font-size:12px;color:var(--muted);white-space:nowrap}
.ficha-body{display:none;padding:0 20px 20px 20px;border-top:1px solid var(--border)}
.ficha-card.open .ficha-body{display:block}
.ficha-body h4{font-size:14px;font-weight:700;margin:16px 0 8px;color:var(--texto)}
.ficha-body p{font-size:14px;color:var(--texto);line-height:1.6}
.ficha-body .invitado-line{color:var(--muted);font-size:13px;margin-top:12px}
.ideas-list{list-style:none;padding:0;margin:0}
.ideas-list li{padding:10px 14px;border-left:3px solid var(--verde);background:rgba(2,158,117,.04);margin-bottom:6px;border-radius:0 6px 6px 0;font-size:14px;line-height:1.5}
.datos-duros{font-size:14px;background:var(--fondo);padding:12px 16px;border-radius:8px;color:var(--texto);line-height:1.6}

/* MODAL */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.active{display:flex}
.modal{background:var(--cardBg);border-radius:14px;max-width:900px;width:100%;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.modal-header h2{font-size:18px;flex:1}
.modal-close{width:32px;height:32px;border:none;background:none;font-size:20px;cursor:pointer;color:var(--muted);border-radius:6px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--fondo)}
.modal-body{display:flex;flex:1;overflow:hidden;min-height:0}
.modal-sidebar{width:200px;border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:8px 0}
.modal-sidebar button{display:block;width:100%;text-align:left;padding:10px 16px;border:none;background:none;font-size:13px;cursor:pointer;color:var(--muted);border-left:3px solid transparent}
.modal-sidebar button:hover{background:var(--fondo)}
.modal-sidebar button.active{color:var(--rojo);font-weight:600;border-left-color:var(--rojo);background:var(--fondo)}
.modal-content{flex:1;overflow-y:auto;padding:24px}
.md-render{font-size:14px;line-height:1.7}
.md-render h1{font-size:22px;margin:24px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.md-render h2{font-size:18px;margin:20px 0 10px;color:var(--rojo)}
.md-render h3{font-size:16px;margin:16px 0 8px}
.md-render h4{font-size:14px;margin:14px 0 6px;font-weight:700}
.md-render p{margin:8px 0}
.md-render strong{font-weight:700}
.md-render em{font-style:italic}
.md-render ul,.md-render ol{margin:8px 0 8px 24px}
.md-render li{margin:4px 0}
.md-render blockquote{border-left:3px solid var(--rojo);padding:8px 16px;margin:12px 0;background:rgba(246,84,73,.04);border-radius:0 6px 6px 0;font-style:italic}
.md-render hr{border:none;border-top:1px solid var(--border);margin:16px 0}
.md-render table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
.md-render th,.md-render td{border:1px solid var(--border);padding:8px 10px;text-align:left}
.md-render th{background:var(--fondo);font-weight:700}
.md-render code{background:var(--fondo);padding:2px 6px;border-radius:4px;font-size:13px;font-family:monospace}
.btn-download{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--verde);color:var(--blanco);border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:16px}
.btn-download:hover{opacity:.85}

/* RESPONSIVE */
@media(max-width:768px){
  .cards-grid{grid-template-columns:1fr}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .modal-body{flex-direction:column}
  .modal-sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);display:flex;overflow-x:auto;padding:0}
  .modal-sidebar button{white-space:nowrap;border-left:none;border-bottom:3px solid transparent}
  .modal-sidebar button.active{border-left:none;border-bottom-color:var(--rojo)}
  .fichas-filters{flex-direction:column}
  .fichas-filters input{min-width:100%}
  .results-count{margin-left:0}
  .header{flex-wrap:wrap}
  .header .subtitle{margin-left:0;width:100%}
  .ficha-header{flex-direction:column;align-items:flex-start}
  .ficha-header .badges{margin-top:4px}
}
@media(max-width:480px){
  .tab-btn{padding:10px 14px;font-size:13px}
  .prog-card{padding:16px}
  .modal{border-radius:8px}
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-wrap">
  <div class="login-box">
    <h1><span class="nv">NV</span> Dashboard</h1>
    <p>Nuestra Voz &middot; Pipeline v5</p>
    <input type="password" id="passwordInput" placeholder="Contrase&ntilde;a" autocomplete="off">
    <button id="loginBtn" onclick="attemptLogin()">Ingresar</button>
    <div class="login-error" id="loginError">Contrase&ntilde;a incorrecta</div>
    <div class="login-loading" id="loginLoading">Descifrando datos...</div>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none">
  <div class="header">
    <span class="nv-logo">NV</span>
    <span class="title">Dashboard Editorial</span>
    <span class="subtitle">Nuestra Voz &middot; Pipeline v5</span>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('programas')">Programas</button>
    <button class="tab-btn" onclick="switchTab('fichas')">Fichas</button>
  </div>
  <div id="tabProgramas" class="tab-content active"></div>
  <div id="tabFichas" class="tab-content"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Entregables</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="modal-sidebar" id="modalSidebar"></div>
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>
</div>

async function deriveKey(password, salt) {
  var enc = new TextEncoder();
  var keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);

    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
}

function b64ToArr(b64) {
  var bin = atob(b64);
  var arr = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

  var data = b64ToArr(encJson.data);
  var tag = b64ToArr(encJson.tag);
  var key = await deriveKey(password, salt);
  var combined = new Uint8Array(data.length + tag.length);
  combined.set(data);
  combined.set(tag, data.length);
  var decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, combined);
  return JSON.parse(new TextDecoder().decode(decrypted));
}

// ---- GLOBALS ----
var APP_DATA = null;

// ---- LOGIN ----
async function attemptLogin() {
  var pw = document.getElementById('passwordInput').value;
  if (!pw) return;
  document.getElementById('loginBtn').disabled = true;
  document.getElementById('loginLoading').style.display = 'block';
  document.getElementById('loginError').style.display = 'none';
  try {
    APP_DATA = await decryptPayload(pw);
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    renderProgramas();
    renderFichas();
  } catch(e) {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginLoading').style.display = 'none';
    document.getElementById('loginBtn').disabled = false;
    document.getElementById('passwordInput').value = '';
    document.getElementById('passwordInput').focus();
  }
}

document.getElementById('passwordInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') attemptLogin(); });

// ---- TABS ----
function switchTab(tab) {
  var btns = document.querySelectorAll('.tab-btn');
  var contents = document.querySelectorAll('.tab-content');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  for (var i = 0; i < contents.length; i++) contents[i].classList.remove('active');
  if (tab === 'programas') {
    btns[0].classList.add('active');
    document.getElementById('tabProgramas').classList.add('active');
  } else {
    btns[1].classList.add('active');
    document.getElementById('tabFichas').classList.add('active');
  }
}

// ---- MARKDOWN RENDERER ----
function mdToHtml(text) {
  if (!text) return '';
  var lines = text.split('\n');
  var html = '';
  var inTable = false, tableHeader = true, inList = false, inOl = false;

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];

    if (/^-{3,}$/.test(line.trim()) || /^\*{3,}$/.test(line.trim())) {
      if (inList) { html += '</ul>'; inList = false; }
      if (inOl) { html += '</ol>'; inOl = false; }
      if (inTable) { html += '</table>'; inTable = false; }
      html += '<hr>';
      continue;
    }

    if (/^\|/.test(line.trim())) {
      if (inList) { html += '</ul>'; inList = false; }
      if (inOl) { html += '</ol>'; inOl = false; }
      if (/^\|[\s\-:|]+\|$/.test(line.trim())) { tableHeader = false; continue; }
      if (!inTable) { html += '<table>'; inTable = true; tableHeader = true; }
      var cells = line.trim().replace(/^\|/, '').replace(/\|$/, '').split('|').map(function(c) { return inlineFmt(c.trim()); });
      var tag = tableHeader ? 'th' : 'td';
      html += '<tr>' + cells.map(function(c) { return '<' + tag + '>' + c + '</' + tag + '>'; }).join('') + '</tr>';
      continue;
    } else if (inTable) { html += '</table>'; inTable = false; }

    var hMatch = line.match(/^(#{1,4})\s+(.+)/);
    if (hMatch) {
      if (inList) { html += '</ul>'; inList = false; }
      if (inOl) { html += '</ol>'; inOl = false; }
      var lvl = hMatch[1].length;
      html += '<h' + lvl + '>' + inlineFmt(hMatch[2]) + '</h' + lvl + '>';
      continue;
    }

    if (/^>\s?/.test(line)) {
      if (inList) { html += '</ul>'; inList = false; }
      if (inOl) { html += '</ol>'; inOl = false; }
      html += '<blockquote>' + inlineFmt(line.replace(/^>\s?/, '')) + '</blockquote>';
      continue;
    }

    if (/^\s*[-*]\s+/.test(line)) {
      if (inOl) { html += '</ol>'; inOl = false; }
      if (!inList) { html += '<ul>'; inList = true; }
      html += '<li>' + inlineFmt(line.replace(/^\s*[-*]\s+/, '')) + '</li>';
      continue;
    } else if (inList && line.trim() === '') { html += '</ul>'; inList = false; continue; }

    if (/^\s*\d+\.\s+/.test(line)) {
      if (inList) { html += '</ul>'; inList = false; }
      if (!inOl) { html += '<ol>'; inOl = true; }
      html += '<li>' + inlineFmt(line.replace(/^\s*\d+\.\s+/, '')) + '</li>';
      continue;
    } else if (inOl && line.trim() === '') { html += '</ol>'; inOl = false; continue; }

    if (line.trim() === '') continue;

    if (inList) { html += '</ul>'; inList = false; }
    if (inOl) { html += '</ol>'; inOl = false; }
    html += '<p>' + inlineFmt(line) + '</p>';
  }

  if (inList) html += '</ul>';
  if (inOl) html += '</ol>';
  if (inTable) html += '</table>';
  return html;
}

function inlineFmt(text) {
  if (!text) return '';
  var s = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
  s = s.replace(/\`([^\`]+)\`/g, '<code>$1</code>');
  return s;
}

// ---- HELPERS ----
function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }

function formatFecha(fecha, dia) {
  var parts = fecha.split('-');
  var months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return parts[2] + ' ' + months[parseInt(parts[1])-1] + ' ' + parts[0] + ' (' + dia + ')';
}

function potClass(p) {
  if (p === 'Alto') return 'alto';
  if (p === 'Medio-Alto') return 'medio-alto';
  if (p === 'Medio') return 'medio';
  return 'bajo';
}

// ---- RENDER PROGRAMAS ----
function renderProgramas() {
  var container = document.getElementById('tabProgramas');
  var html = '<div class="cards-grid">';
  APP_DATA.programas.forEach(function(prog, idx) {
    var fechaStr = formatFecha(prog.fecha, prog.dia);
    html += '<div class="prog-card">';
    html += '<div class="meta">';
    html += '<span class="fecha">' + fechaStr + '</span>';
    html += '<span class="version">' + prog.version + '</span>';
    html += '<span class="badge badge-completado">' + prog.estado + '</span>';
    html += '</div>';
    html += '<h3>' + esc(prog.seleccionada) + '</h3>';
    html += '<div class="invitado">' + esc(prog.invitado) + '</div>';
    html += '<div class="stats-row">';
    html += '<div class="stat-box"><div class="val">' + prog.totalEntrevistas + '</div><div class="label">Entrevistas</div></div>';
    html += '<div class="stat-box"><div class="val">' + prog.piezasGeneradas + '</div><div class="label">Piezas</div></div>';
    html += '<div class="stat-box"><div class="val" style="font-size:14px">' + esc(prog.potencial) + '</div><div class="label">Potencial</div></div>';
    html += '<div class="stat-box"><div class="val" style="font-size:12px;text-transform:capitalize">' + esc(prog.categoria) + '</div><div class="label">Categor\u00eda</div></div>';
    html += '</div>';
    html += '<div class="pills">';
    if (prog.tiposEntregable) prog.tiposEntregable.forEach(function(t) { html += '<span class="pill">' + esc(t) + '</span>'; });
    html += '</div>';
    html += '<button class="btn-entregables" onclick="openModal(' + idx + ')">Ver entregables \u2192</button>';
    html += '</div>';
  });
  html += '</div>';
  container.innerHTML = html;
}

// ---- RENDER FICHAS ----
function renderFichas() {
  var container = document.getElementById('tabFichas');
  var html = '';
  html += '<div class="fichas-filters">';
  html += '<input type="text" id="fichaSearch" placeholder="Buscar tema, invitado, datos..." oninput="filterFichas()">';
  html += '<select id="fichasPotencial" onchange="filterFichas()"><option value="">Potencial: Todos</option><option value="Alto">Alto</option><option value="Medio-Alto">Medio-Alto</option><option value="Medio">Medio</option><option value="Bajo">Bajo</option></select>';
  html += '<select id="fichasRepurposing" onchange="filterFichas()"><option value="">Repurposing: Todos</option><option value="si">Con repurposing</option><option value="no">Solo ficha</option></select>';
  html += '<span class="results-count" id="fichasCount"></span>';
  html += '</div>';
  html += '<div class="fichas-list" id="fichasList"></div>';
  container.innerHTML = html;
  filterFichas();
}

function filterFichas() {
  var search = (document.getElementById('fichaSearch').value || '').toLowerCase();
  var pot = document.getElementById('fichasPotencial').value;
  var rep = document.getElementById('fichasRepurposing').value;

  var filtered = APP_DATA.fichas.filter(function(f) {
    if (search) {
      var hay = [f.tema, f.invitado, f.datosDuros, f.tesis].concat(f.ideasClave || []).join(' ').toLowerCase();
      if (hay.indexOf(search) === -1) return false;
    }
    if (pot && f.potencial !== pot) return false;
    if (rep === 'si' && !f.tieneRepurposing) return false;
    if (rep === 'no' && f.tieneRepurposing) return false;
    return true;
  });

  document.getElementById('fichasCount').textContent = filtered.length + ' de ' + APP_DATA.fichas.length + ' fichas';

  var html = '';
  filtered.forEach(function(f) {
    var repClass = f.tieneRepurposing ? ' has-repurposing' : '';
    html += '<div class="ficha-card' + repClass + '" id="ficha-' + f.id + '">';
    html += '<div class="ficha-header" onclick="toggleFicha(' + f.id + ')">';
    html += '<span class="arrow">&#9654;</span>';
    html += '<span class="tema">' + esc(f.tema) + '</span>';
    html += '<span class="fecha-sm">' + f.programaFecha + '</span>';
    html += '<div class="badges">';
    html += '<span class="badge badge-' + potClass(f.potencial) + '">' + esc(f.potencial) + '</span>';
    html += '<span class="badge badge-cat">' + esc(f.categoria) + '</span>';
    if (f.tieneRepurposing) html += '<span class="badge badge-repurposing">Repurposing completo</span>';
    html += '</div>';
    html += '</div>';
    html += '<div class="ficha-body">';
    html += '<div class="invitado-line">Invitado: ' + esc(f.invitado) + '</div>';
    if (f.tesis) {
      html += '<h4>Tesis principal</h4>';
      html += '<p>' + esc(f.tesis) + '</p>';
    }
    if (f.ideasClave && f.ideasClave.length) {
      html += '<h4>Ideas clave</h4>';
      html += '<ul class="ideas-list">';
      f.ideasClave.forEach(function(idea) { html += '<li>' + esc(idea) + '</li>'; });
      html += '</ul>';
    }
    if (f.datosDuros) {
      html += '<h4>Datos duros</h4>';
      html += '<div class="datos-duros">' + esc(f.datosDuros) + '</div>';
    }
    html += '</div></div>';
  });
  document.getElementById('fichasList').innerHTML = html;
}

function toggleFicha(id) {
  var el = document.getElementById('ficha-' + id);
  if (el) el.classList.toggle('open');
}

// ---- MODAL ----
var currentProgIdx = 0;

function openModal(progIdx) {
  currentProgIdx = progIdx;
  var prog = APP_DATA.programas[progIdx];
  document.getElementById('modalTitle').textContent = prog.seleccionada;

  var sidebar = document.getElementById('modalSidebar');
  var shtml = '';
  var pasos = Object.keys(prog.entregables);
  pasos.forEach(function(paso, i) {
    var ent = prog.entregables[paso];
    shtml += '<button data-paso="' + paso + '" onclick="showPaso(' + progIdx + ',\'' + paso + '\')" ' + (i === 0 ? 'class="active"' : '') + '>' + esc(ent.tipo) + '</button>';
  });
  sidebar.innerHTML = shtml;
  showPaso(progIdx, pasos[0]);
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function showPaso(progIdx, paso) {
  var prog = APP_DATA.programas[progIdx];
  var ent = prog.entregables[paso];

  var btns = document.querySelectorAll('#modalSidebar button');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.remove('active');
    if (btns[i].getAttribute('data-paso') === paso) btns[i].classList.add('active');
  }

  var contentEl = document.getElementById('modalContent');
  var html = '';
  html += '<button class="btn-download" onclick="downloadEntregable(' + progIdx + ',\'' + paso + '\')">&#8681; Descargar ' + esc(ent.archivo) + '</button>';
  html += '<div class="md-render">' + mdToHtml(ent.contenido) + '</div>';
  contentEl.innerHTML = html;
  contentEl.scrollTop = 0;
}

function downloadEntregable(progIdx, paso) {
  var ent = APP_DATA.programas[progIdx].entregables[paso];
  var blob = new Blob([ent.contenido], { type: 'text/markdown;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = ent.archivo;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});
</script>
